const VERBAL_QUIZ=[
{p:"Greenhouse-gas emissions in the EU fell by around 30% between 1990 and 2020, yet emissions from transport rose over the same period. Transport is the only major sector emitting more than in 1990: despite steady improvements in engine efficiency, growth in traffic volumes has outpaced the technological gains.",p_pl:"Emisje gazów cieplarnianych w UE spadły o ok. 30% między 1990 a 2020, ale emisje z transportu w tym samym okresie wzrosły. Transport to jedyny duży sektor emitujący więcej niż w 1990: mimo stałej poprawy sprawności silników wzrost natężenia ruchu przerósł zyski technologiczne.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["Engine efficiency has not improved since 1990","In transport, traffic growth has more than offset efficiency improvements","Every sector except transport cut its emissions by exactly 30%","Transport emissions will keep rising in the future"],o_pl:["Sprawność silników nie poprawiła się od 1990","W transporcie wzrost ruchu z nawiązką zniwelował poprawę sprawności","Każdy sektor poza transportem obniżył emisje dokładnie o 30%","Emisje z transportu będą dalej rosły"],a:1,e:"The passage says gains were <b>outpaced by traffic growth</b>. (A) contradicts it; (C) confuses the overall figure with sector figures; (D) predicts — the text doesn't.<br>🪤 <b>Traps used:</b> (A) contradiction · (C) scope shift (EU-total → per-sector) · (D) projection beyond the text.",e_pl:"Tekst mówi, że zyski <b>przerósł wzrost ruchu</b>. (A) przeczy tekstowi; (C) myli liczbę ogólną z sektorową; (D) prognozuje — tekst nie.<br>🪤 <b>Pułapki:</b> (A) sprzeczność · (C) zmiana zakresu (całość UE → sektor) · (D) prognoza spoza tekstu."},
{p:"The EU has 24 official languages. All EU legislation is published in every official language, and any citizen may write to an EU institution in any of the 24 and receive a reply in that same language. Internal working documents, however, are typically drafted in only a few languages for practical reasons.",p_pl:"UE ma 24 języki urzędowe. Całe prawodawstwo UE publikuje się w każdym z nich, a każdy obywatel może napisać do instytucji UE w dowolnym z 24 języków i otrzymać odpowiedź w tym samym języku. Wewnętrzne dokumenty robocze powstają jednak zwykle tylko w kilku językach ze względów praktycznych.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["Citizens must contact EU institutions in English, French or German","A new EU regulation will be available in all 24 official languages","All internal working documents are translated into every official language","Replies to citizens may be sent in a different language than the enquiry"],o_pl:["Obywatele muszą pisać do instytucji po angielsku, francusku lub niemiecku","Nowe rozporządzenie UE będzie dostępne we wszystkich 24 językach urzędowych","Wszystkie dokumenty robocze tłumaczy się na każdy język urzędowy","Odpowiedź do obywatela może przyjść w innym języku niż zapytanie"],a:1,e:"Legislation is published in <b>every official language</b>. (A) and (D) contradict the citizen-correspondence rule; (C) contradicts the last sentence.<br>🪤 <b>Traps used:</b> (A)(D) contradiction · (C) extreme word 'all' applied to the wrong category (internal docs ≠ legislation).",e_pl:"Prawodawstwo publikuje się w <b>każdym języku urzędowym</b>. (A) i (D) przeczą zasadzie korespondencji z obywatelami; (C) przeczy ostatniemu zdaniu.<br>🪤 <b>Pułapki:</b> (A)(D) sprzeczność · (C) absolutne 'wszystkie' przyklejone do złej kategorii (dokumenty robocze ≠ prawodawstwo)."},
{p:"Since its launch in 1987, Erasmus has enabled more than 13 million people to study, train or volunteer abroad. Originally limited to university students, the programme now also covers school pupils, apprentices and adult learners. Its budget for 2021-2027 nearly doubled compared with the previous seven-year period.",p_pl:"Od startu w 1987 Erasmus umożliwił ponad 13 milionom osób naukę, szkolenie lub wolontariat za granicą. Początkowo ograniczony do studentów, dziś obejmuje też uczniów, praktykantów i dorosłych słuchaczy. Jego budżet na 2021-2027 niemal się podwoił względem poprzedniej siedmiolatki.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["More than 13 million university students have studied abroad through Erasmus","At its launch, Erasmus was available only to university students","The Erasmus budget doubles every seven years","Erasmus is the EU's largest spending programme"],o_pl:["Ponad 13 milionów studentów studiowało za granicą dzięki Erasmusowi","Na starcie Erasmus był dostępny wyłącznie dla studentów","Budżet Erasmusa podwaja się co siedem lat","Erasmus to największy program wydatkowy UE"],a:1,e:"'<b>Originally limited to university students</b>' — (B) is stated. (A) wrongly attributes all 13 million to university students; (C) generalises one increase; (D) is not mentioned.<br>🪤 <b>Traps used:</b> (A) partial truth (real number, wrong group) · (C) one instance → 'every period' generalisation · (D) outside knowledge / not stated.",e_pl:"'<b>Początkowo ograniczony do studentów</b>' — (B) jest w tekście. (A) błędnie przypisuje całe 13 mln studentom; (C) uogólnia jedno zwiększenie; (D) — tekst milczy.<br>🪤 <b>Pułapki:</b> (A) półprawda (prawdziwa liczba, zła grupa) · (C) jeden przypadek → uogólnienie 'co siedem lat' · (D) wiedza spoza tekstu."},
{p:"The regulation classifies applications according to the risk they pose. Minimal-risk systems face no new obligations, while high-risk systems must satisfy strict requirements before they may be placed on the market. A small number of practices considered unacceptable are prohibited outright.",p_pl:"Rozporządzenie klasyfikuje zastosowania według ryzyka. Systemy minimalnego ryzyka nie mają nowych obowiązków, a systemy wysokiego ryzyka muszą spełnić surowe wymogi, zanim trafią na rynek. Niewielka liczba praktyk uznanych za niedopuszczalne jest zakazana całkowicie.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["All systems covered by the regulation face new obligations","Some applications are banned entirely under the regulation","High-risk systems may never be placed on the market","Most applications are classified as high-risk"],o_pl:["Wszystkie systemy objęte rozporządzeniem mają nowe obowiązki","Niektóre zastosowania są całkowicie zakazane","Systemy wysokiego ryzyka nigdy nie mogą trafić na rynek","Większość zastosowań klasyfikuje się jako wysokiego ryzyka"],a:1,e:"'A small number of practices… are <b>prohibited outright</b>.' (A) contradicts the minimal-risk rule; (C) contradicts 'before they may be placed'; (D) has no support.<br>🪤 <b>Traps used:</b> (A) extreme word 'all' · (C) 'never' — absolute vs conditional 'must satisfy requirements before' · (D) quantity claim with no basis (Cannot Say).",e_pl:"'Niewielka liczba praktyk… jest <b>zakazana całkowicie</b>.' (A) przeczy zasadzie minimalnego ryzyka; (C) przeczy 'zanim trafią na rynek'; (D) bez oparcia.<br>🪤 <b>Pułapki:</b> (A) absolutne 'wszystkie' · (C) 'nigdy' — absolut zamiast warunku 'muszą spełnić wymogi' · (D) twierdzenie ilościowe bez podstawy (Nie wiadomo)."},
{p:"Small and medium-sized enterprises account for 99% of all businesses in the EU, yet they generate only around half of total value added. Analysts note that SMEs face disproportionately high fixed costs when complying with regulation, costs which larger firms can spread over much greater output.",p_pl:"Małe i średnie przedsiębiorstwa to 99% wszystkich firm w UE, ale wytwarzają tylko około połowy wartości dodanej. Analitycy zauważają, że MŚP ponoszą nieproporcjonalnie wysokie koszty stałe zgodności z regulacjami — koszty, które większe firmy rozkładają na znacznie większą produkcję.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["Large firms produce a share of value added far larger than their share of the number of businesses","SMEs are less efficient than large firms in every respect","Regulatory costs are the main reason SMEs stay small","99% of EU value added comes from SMEs"],o_pl:["Duże firmy wytwarzają udział wartości dodanej znacznie większy niż ich udział w liczbie firm","MŚP są mniej wydajne od dużych firm pod każdym względem","Koszty regulacyjne to główny powód, dla którego MŚP pozostają małe","99% wartości dodanej w UE pochodzi z MŚP"],a:0,e:"1% of firms generate ~half of value added — <b>(A) follows arithmetically</b>. (B) and (C) overreach; (D) misreads the figures.<br>🪤 <b>Traps used:</b> (B) extreme 'in every respect' · (C) attributed analyst note upgraded to 'the main reason' (opinion→fact + causation) · (D) number transplanted onto the wrong metric.",e_pl:"1% firm wytwarza ok. połowy wartości dodanej — <b>(A) wynika arytmetycznie</b>. (B) i (C) wykraczają poza tekst; (D) myli wskaźniki.<br>🪤 <b>Pułapki:</b> (B) absolutne 'pod każdym względem' · (C) uwaga analityków awansowana na 'główny powód' (opinia→fakt + przyczynowość) · (D) liczba przeszczepiona na złą miarę."},
{p:"In 2023, renewable sources generated more electricity in the EU than fossil fuels for the first time. Progress is uneven, however: some member states draw over 70% of their electricity from renewables while others remain below 20%. Better grid interconnection between countries is widely seen as key to balancing these differences.",p_pl:"W 2023 źródła odnawialne po raz pierwszy wytworzyły w UE więcej elektryczności niż paliwa kopalne. Postęp jest jednak nierówny: część państw czerpie z OZE ponad 70% elektryczności, inne pozostają poniżej 20%. Lepsze połączenia sieci między krajami powszechnie uchodzą za klucz do wyrównania tych różnic.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["Fossil fuels are no longer used for electricity in the EU","The share of renewable electricity varies considerably between member states","All member states will reach 70% renewables once grids are connected","Renewables produce more energy than fossil fuels in every member state"],o_pl:["Paliw kopalnych nie używa się już w UE do produkcji elektryczności","Udział OZE w elektryczności znacznie się różni między państwami","Wszystkie państwa osiągną 70% OZE po połączeniu sieci","OZE produkują więcej energii niż paliwa kopalne w każdym państwie"],a:1,e:"The 70% vs 20% contrast shows <b>large variation</b>. (A), (D) overstate the EU-level figure; (C) turns an opinion about grids into a guarantee.<br>🪤 <b>Traps used:</b> (A) 'no longer used' — absolute · (C) 'widely seen as key' → 'will reach' (opinion→fact, projection) · (D) scope shift (EU aggregate → every member state).",e_pl:"Kontrast 70% vs 20% pokazuje <b>duże zróżnicowanie</b>. (A), (D) rozdymają liczbę ogólnounijną; (C) zamienia opinię o sieciach w gwarancję.<br>🪤 <b>Pułapki:</b> (A) absolutne 'nie używa się już' · (C) 'uchodzą za klucz' → 'osiągną' (opinia→fakt, prognoza) · (D) zmiana zakresu (suma UE → każde państwo)."},
{p:"The EU's median age is projected to rise from 44 today to around 49 by 2050, while the working-age population is expected to shrink by several million. Some economists argue that higher productivity and longer working lives could offset the economic effects of this decline — but only if supported by adequate policies.",p_pl:"Mediana wieku w UE ma wzrosnąć z 44 lat dziś do ok. 49 w 2050, a populacja w wieku produkcyjnym ma się skurczyć o kilka milionów. Niektórzy ekonomiści twierdzą, że wyższa produktywność i dłuższa aktywność zawodowa mogłyby zrównoważyć gospodarcze skutki tego spadku — ale tylko przy wsparciu odpowiednich polityk.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["The EU population will shrink by several million by 2050","Offsetting the effects of ageing is considered possible but not automatic","Higher productivity has already offset the effects of ageing","By 2050 most Europeans will be older than 49"],o_pl:["Ludność UE skurczy się o kilka milionów do 2050","Zrównoważenie skutków starzenia uchodzi za możliwe, ale nie automatyczne","Wyższa produktywność już zrównoważyła skutki starzenia","W 2050 większość Europejczyków będzie miała ponad 49 lat"],a:1,e:"'Could offset… <b>only if</b> supported by adequate policies' = possible, conditional. (A) confuses working-age with total population; (D) misreads 'median'.<br>🪤 <b>Traps used:</b> (A) scope shift (working-age → whole population) · (C) tense shift ('could' → 'has already') · (D) statistical term misread (median ≠ most people).",e_pl:"'Mogłyby zrównoważyć… <b>tylko przy</b> odpowiednich politykach' = możliwe, warunkowe. (A) myli wiek produkcyjny z całą populacją; (D) źle czyta 'medianę'.<br>🪤 <b>Pułapki:</b> (A) zmiana zakresu (wiek produkcyjny → cała ludność) · (C) zmiana czasu ('mogłyby' → 'już zrównoważyła') · (D) błędne czytanie pojęcia (mediana ≠ większość)."},
{p:"Under EU rules, consumers who buy goods online may return them within 14 days without giving any reason. This right of withdrawal does not apply to certain categories, such as personalised items or perishable goods. Traders must issue the refund within 14 days of being informed of the consumer's decision.",p_pl:"Według przepisów UE konsumenci kupujący towary online mogą je zwrócić w 14 dni bez podania przyczyny. Prawo odstąpienia nie obejmuje niektórych kategorii, jak przedmioty personalizowane czy towary łatwo psujące się. Sprzedawca musi zwrócić pieniądze w 14 dni od poinformowania go o decyzji konsumenta.",q:"Which statement follows from the passage?",q_pl:"Które zdanie wynika z tekstu?",o:["Consumers may return any online purchase within 14 days","A consumer returning shoes bought online need not state a reason","Refunds must be issued within 14 days of the goods being returned","Personalised items may be returned within 7 days instead"],o_pl:["Konsument może zwrócić każdy zakup online w 14 dni","Konsument zwracający buty kupione online nie musi podawać przyczyny","Zwrot pieniędzy musi nastąpić w 14 dni od odesłania towaru","Przedmioty personalizowane można zwrócić w 7 dni"],a:1,e:"Shoes aren't in the excluded categories, and no reason is required — <b>(B) follows</b>. (A) ignores the exceptions; (C) — the clock runs from being <i>informed</i>; (D) invents a rule.<br>🪤 <b>Traps used:</b> (A) extreme 'any' vs stated exceptions · (C) partial truth — right number, wrong trigger event · (D) detail invented, never in the text.",e_pl:"Buty nie należą do wyjątków, a przyczyny podawać nie trzeba — <b>(B) wynika</b>. (A) ignoruje wyjątki; (C) — zegar rusza od <i>poinformowania</i>; (D) wymyśla regułę.<br>🪤 <b>Pułapki:</b> (A) absolutne 'każdy' wbrew wyjątkom · (C) półprawda — dobra liczba, złe zdarzenie startowe · (D) szczegół zmyślony, nieobecny w tekście."}
];

(function(){ const o=load(); if(o.lang==="pl"||o.lang==="en") lang=o.lang; })();

function toast(t){ toastEl.textContent=t; toastEl.classList.add("show"); setTimeout(()=>toastEl.classList.remove("show"),750); }
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }

/* ================= MENU ================= */
function renderMenu(){
  const el=document.getElementById("start");
  let h='<h1>'+MENU.title+'</h1><p>'+TT(MENU.sub)+'</p><div class="examBox">'+TT(MENU.exam)+'</div>';
  MENU.groups.forEach(g=>{
    h+='<div class="gLab">'+TT(g.lab)+'</div><div class="modes">';
    g.items.forEach(it=>{
      h+='<button class="mode" style="background:linear-gradient(120deg,'+it.g+')" data-act="start" data-sec="'+it.sec+'">'+TT(it.t)+'<small>'+TT(it.s)+'</small></button>';
    });
    h+='</div>';
  });
  const o=load();
  h+='<div class="statline">'+(o.best?U("best")+": 🔥 "+o.best:"")+'</div>';
  h+='<div class="srcnote">'+TT(MENU.note)+'</div>';
  el.innerHTML=h;
  document.getElementById("langBtn").textContent = lang==="en"?"🌐 PL":"🌐 EN";
  document.getElementById("swipehint").textContent=U("swipe");
}
renderMenu();

function start(id){
  secId=id; sec=SEC[id];
  document.getElementById("start").classList.add("hidden");
  document.getElementById("end").classList.add("hidden");
  if(sec.kind==="learn"){
    queue=sec.deck.map((_,i)=>i); pos=0; mastered=new Set(); streak=0; revealed=false;
    document.getElementById("swipehint").style.display="";
    renderLearn(true,true);
  }else{
    qDeck = id==="mixed"
      ? shuffleArr([].concat(EUK_QUIZ,VERBAL_QUIZ,NUM_QUIZ,ABS_QUIZ,DIGI_QUIZ)).slice(0,20)
      : sec.deck.slice();
    qPos=0; qScore=0; qAnswered=false; qChoice=-1; qWrong=[];
    document.getElementById("swipehint").style.display="none";
    renderQuiz(true);
  }
}

/* ================= LEARN ENGINE ================= */
function learnHTML(d){
  const grad="linear-gradient(160deg,"+sec.c[0]+","+sec.c[1]+")";
  const kws=(d.kw||[]).map(k=>'<span class="kw">'+k+'</span>').join("");
  return '<div class="card">'
    +'<div class="bg" style="background:'+grad+'"></div>'
    +'<div class="top"><div class="left"><button class="miniBtn" data-act="menu">☰</button><span class="chip">'+TT(sec.name)+'</span></div>'
    +'<div class="right"><span class="chip" id="flame">🔥 '+streak+'</span><span class="chip" id="prog"></span></div></div>'
    +'<div class="bar"><i id="barfill"></i></div>'
    +'<div class="mid" id="mid">'
    +'<div class="qlabel">'+U("card")+' '+(pos+1)+' · '+TT(sec.name)+'</div>'
    +'<div class="title">'+T(d,"t")+'</div>'
    +'<div class="hint" id="hint"><span class="dot">?</span><span>'+U("tapHint")+'</span></div>'
    +'<div class="answer hidden" id="answer">'
    +'<div class="sec"><div class="lab">'+U("inShort")+'</div><div class="txt">'+T(d,"one")+'</div></div>'
    +'<div class="sec"><div class="lab">'+U("say")+'</div><div class="txt">'+T(d,"say")+'</div></div>'
    +(d.ex?'<div class="sec"><div class="lab">'+U("think")+'</div><div class="txt">'+T(d,"ex")+'</div></div>':'')
    +'<div class="hook">🧠 '+T(d,"hook")+'</div>'
    +'<div class="kws">'+kws+'</div>'
    +'</div></div>'
    +'<div class="foot" id="foot"><button class="btn reveal" data-act="reveal">'+U("reveal")+'</button></div>'
    +'</div>';
}
function swapCard(el,instant){
  if(instant||!curEl){ stage.innerHTML=""; stage.appendChild(el); curEl=el; return; }
  el.classList.add("below"); stage.appendChild(el);
  const old=curEl; curEl=el;
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    if(old) old.classList.add("above");
    el.classList.remove("below");
    setTimeout(()=>{ if(old&&old.parentNode)old.parentNode.removeChild(old); },480);
  });});
}
function renderLearn(instant,fresh){
  if(pos>=queue.length) return finishLearn();
  const d=sec.deck[queue[pos]]; cur=d; revealed=false;
  const tmp=document.createElement("div"); tmp.innerHTML=learnHTML(d);
  swapCard(tmp.firstElementChild,instant);
  updateLearnProg();
}
function updateLearnProg(){
  const el=curEl; if(!el)return;
  const prog=el.querySelector("#prog"); if(prog)prog.textContent=mastered.size+"/"+sec.deck.length;
  const fill=el.querySelector("#barfill"); if(fill)fill.style.width=(mastered.size/sec.deck.length*100)+"%";
  const fl=el.querySelector("#flame"); if(fl)fl.textContent="🔥 "+streak;
}
function revealCurrent(){
  if(revealed||!curEl) return;
  revealed=true;
  const a=curEl.querySelector("#answer"); if(a)a.classList.remove("hidden");
  const mid=curEl.querySelector("#mid"); if(mid)mid.classList.add("revealed");
  const h=curEl.querySelector("#hint"); if(h)h.style.display="none";
  const foot=curEl.querySelector("#foot");
  if(foot) foot.innerHTML='<button class="btn again" data-act="again">'+U("again")+'</button><button class="btn got" data-act="got">'+U("got")+'</button>';
}
function mark(got){
  if(!cur) return;
  const idx=queue[pos];
  if(got){
    mastered.add(idx); streak++; bestStreak=Math.max(bestStreak,streak);
    if(streak>0&&streak%5===0) toast("🔥 "+streak+" "+U("inRow")); else toast("✓");
    queue=queue.filter((qi,k)=> k<=pos?true:qi!==idx);
  }else{
    streak=0; toast(U("backSoon"));
    const gap=Math.min(5,queue.length-pos);
    queue.splice(pos+gap,0,idx);
  }
  const o=load(); o.best=Math.max(o.best||0,bestStreak); save(o);
  pos++; setTimeout(()=>renderLearn(false),150);
}
function nextSkip(){
  if(sec.kind==="quiz"){ if(qAnswered) quizNext(); return; }
  if(cur && !mastered.has(queue[pos])) queue.push(queue[pos]);
  pos++; renderLearn(false);
}
function finishLearn(){
  document.getElementById("swipehint").style.display="none";
  document.getElementById("endTitle").textContent=U("deckDone");
  document.getElementById("endMsg").textContent=fmt(U("learnEnd"),{m:mastered.size,t:sec.deck.length,b:bestStreak});
  document.getElementById("endBtns").innerHTML=
    '<button class="mode" style="background:linear-gradient(120deg,'+sec.c[0]+','+sec.c[1]+')" data-act="restart">'+U("restartDeck")+'</button>'
    +'<button class="mode" style="background:linear-gradient(120deg,#42A5F5,#0D47A1)" data-act="menu">'+U("back")+'</button>';
  document.getElementById("end").classList.remove("hidden");
}

/* ================= QUIZ ENGINE ================= */
function quizHTML(d){
  const grad="linear-gradient(160deg,"+sec.c[0]+","+sec.c[1]+")";
  const letters=["A","B","C","D","E"];
  const opts=T(d,"o").map((o,i)=>'<button class="opt" data-act="opt" data-i="'+i+'"><span class="ltr">'+letters[i]+'</span><span>'+o+'</span></button>').join("");
  const pas=T(d,"p");
  return '<div class="card">'
    +'<div class="bg" style="background:'+grad+'"></div>'
    +'<div class="top"><div class="left"><button class="miniBtn" data-act="menu">☰</button><span class="chip">'+TT(sec.name)+'</span></div>'
    +'<div class="right"><span class="chip">✓ '+qScore+'</span><span class="chip">'+(qPos+1)+'/'+qDeck.length+'</span></div></div>'
    +'<div class="bar"><i style="width:'+(qPos/qDeck.length*100)+'%"></i></div>'
    +'<div class="qbody" id="qbody">'
    +(pas?'<div class="passage" style="margin-top:12px">'+pas+'</div>':'<div style="margin-top:12px"></div>')
    +'<div class="qq'+(d.big?' big':'')+'">'+T(d,"q")+'</div>'
    +'<div class="opts" id="opts">'+opts+'</div>'
    +'<div class="expl hidden" id="expl"></div>'
    +'</div>'
    +'<div class="foot" id="qfoot"></div>'
    +'</div>';
}
function renderQuiz(instant){
  if(qPos>=qDeck.length) return finishQuiz();
  qAnswered=false; qChoice=-1;
  const tmp=document.createElement("div"); tmp.innerHTML=quizHTML(qDeck[qPos]);
  swapCard(tmp.firstElementChild,instant);
}
function applyAnswerUI(i){
  const d=qDeck[qPos];
  const opts=curEl.querySelectorAll(".opt");
  opts.forEach((b,k)=>{
    if(k===d.a) b.classList.add("correct");
    else if(k===i) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const ex=curEl.querySelector("#expl");
  if(ex){ ex.innerHTML=T(d,"e"); ex.classList.remove("hidden"); }
  const foot=curEl.querySelector("#qfoot");
  if(foot) foot.innerHTML='<button class="btn next" data-act="qnext">'+(qPos+1>=qDeck.length?U("seeResult"):U("next"))+'</button>';
}
function answer(i){
  if(qAnswered||!curEl) return;
  qAnswered=true; qChoice=i;
  const d=qDeck[qPos];
  if(i===d.a){ qScore++; toast("✓"); } else { qWrong.push(d); toast("✗"); }
  const chips=curEl.querySelectorAll(".right .chip");
  if(chips[0]) chips[0].textContent="✓ "+qScore;
  applyAnswerUI(i);
}
function quizNext(){ qPos++; renderQuiz(false); }
function finishQuiz(){
  const total=qDeck.length, pct=Math.round(qScore/total*100);
  const passN = sec.pass!=null ? sec.pass : Math.ceil(total*(sec.passPct||.5));
  const passed = qScore>=passN;
  document.getElementById("endTitle").textContent = passed?U("passed"):U("failed");
  document.getElementById("endMsg").innerHTML =
    U("score")+": <b>"+qScore+" / "+total+"</b> ("+pct+"%). "+U("passMark")+": "+passN+"/"+total+"."
    +(sec.exam?"<br><span style='opacity:.7'>"+TT(sec.exam)+"</span>":"")
    +(qWrong.length?"<br>"+fmt(U("missedN"),{n:qWrong.length}):"");
  let btns='';
  if(qWrong.length) btns+='<button class="mode" style="background:linear-gradient(120deg,#FF7043,#BF360C)" data-act="retryWrong">'+fmt(U("retryN"),{n:qWrong.length})+'</button>';
  btns+='<button class="mode" style="background:linear-gradient(120deg,'+sec.c[0]+','+sec.c[1]+')" data-act="restart">'+U("restartQuiz")+'</button>';
  btns+='<button class="mode" style="background:linear-gradient(120deg,#42A5F5,#0D47A1)" data-act="menu">'+U("back")+'</button>';
  document.getElementById("endBtns").innerHTML=btns;
  document.getElementById("end").classList.remove("hidden");
}

/* ================= LANGUAGE TOGGLE ================= */
function toggleLang(){
  lang = lang==="en"?"pl":"en";
  const o=load(); o.lang=lang; save(o);
  const startVis = !document.getElementById("start").classList.contains("hidden");
  const endVis = !document.getElementById("end").classList.contains("hidden");
  renderMenu();
  if(endVis && sec){
    if(sec.kind==="learn") finishLearn(); else finishQuiz();
  } else if(!startVis && sec){
    if(sec.kind==="learn"){
      const wasRev=revealed;
      renderLearn(true);
      if(wasRev) revealCurrent();
    } else if(qPos<qDeck.length){
      const wasA=qAnswered, ch=qChoice;
      renderQuiz(true);
      if(wasA){ qAnswered=true; qChoice=ch; applyAnswerUI(ch); }
    }
  }
}

/* ================= ACTIONS & INPUT ================= */
function goHome(){
  document.getElementById("end").classList.add("hidden");
  document.getElementById("swipehint").style.display="none";
  stage.innerHTML=""; curEl=null; sec=null; secId=null;
  renderMenu();
  document.getElementById("start").classList.remove("hidden");
}
function doAct(el){
  const a=el.getAttribute("data-act");
  if(a==="start") start(el.getAttribute("data-sec"));
  else if(a==="lang") toggleLang();
  else if(a==="reveal") revealCurrent();
  else if(a==="again") mark(false);
  else if(a==="got") mark(true);
  else if(a==="opt") answer(parseInt(el.getAttribute("data-i"),10));
  else if(a==="qnext") quizNext();
  else if(a==="restart"){ document.getElementById("end").classList.add("hidden"); start(secId); }
  else if(a==="retryWrong"){ document.getElementById("end").classList.add("hidden"); qDeck=qWrong.slice(); qPos=0; qScore=0; qWrong=[]; renderQuiz(true); }
  else if(a==="menu") goHome();
}
const app=document.getElementById("app");
function closestAct(node){ while(node&&node!==app){ if(node.getAttribute&&node.getAttribute("data-act"))return node; node=node.parentNode; } return null; }
function handleTap(target){
  const act=closestAct(target);
  if(act){ doAct(act); return; }
  if(sec&&sec.kind==="learn"&&!revealed) revealCurrent();
}
let tX=0,tY=0,tT=0,tStart=null;
app.addEventListener("touchstart",e=>{ const t=e.touches[0]; tX=t.clientX;tY=t.clientY;tT=Date.now();tStart=e.target; },{passive:true});
app.addEventListener("touchend",e=>{
  if(tStart===null) return;
  if(tStart.closest&&tStart.closest(".overlay")){ tStart=null; return; }
  const t=e.changedTouches[0]; const dx=t.clientX-tX, dy=t.clientY-tY, dt=Date.now()-tT;
  const moved=Math.abs(dx)>14||Math.abs(dy)>14;
  if(!moved&&dt<900){ e.preventDefault(); handleTap(tStart); tStart=null; return; }
  const sc=tStart.closest?tStart.closest(".answer,.qbody"):null;
  if(sc&&sc.scrollHeight>sc.clientHeight+2){ tStart=null; return; }
  if(!sec){ tStart=null; return; }
  if(dy<-40){
    if(sec.kind==="learn"){ if(!revealed) revealCurrent(); else nextSkip(); }
    else if(qAnswered) quizNext();
  } else if(dy>40 && sec.kind==="learn" && !revealed) revealCurrent();
  tStart=null;
},{passive:false});
app.addEventListener("click",e=>{ if(e.target.closest&&e.target.closest(".overlay")){ const act=closestAct(e.target); if(act)doAct(act); return; } handleTap(e.target); });
let wlock=false;
app.addEventListener("wheel",e=>{ if(wlock||!sec)return; if(Math.abs(e.deltaY)<12)return; wlock=true;setTimeout(()=>wlock=false,500);
  if(e.deltaY>0){ if(sec.kind==="learn"){ if(!revealed) revealCurrent(); else nextSkip(); } else if(qAnswered) quizNext(); }
},{passive:true});
document.addEventListener("keydown",e=>{
  if(e.key==="l"||e.key==="L"){ toggleLang(); return; }
  if(!sec) return;
  if(sec.kind==="learn"){
    if(e.key==="ArrowDown"||e.key===" "){e.preventDefault(); if(!revealed) revealCurrent(); else nextSkip();}
    else if(e.key==="ArrowUp"){ if(!revealed) revealCurrent(); }
    else if(e.key==="1"&&revealed) mark(false);
    else if(e.key==="2"&&revealed) mark(true);
  }else{
    if(["1","2","3","4","5"].includes(e.key)&&!qAnswered) answer(parseInt(e.key,10)-1);
    else if((e.key==="ArrowDown"||e.key===" "||e.key==="Enter")&&qAnswered){e.preventDefault(); quizNext();}
  }
});
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body></html>
