<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0b0b0f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#fff}
#app{position:relative;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden;background:#000;box-shadow:0 0 60px #000}
.card{position:absolute;inset:0;display:flex;flex-direction:column;padding:18px 20px calc(18px + env(safe-area-inset-bottom));transition:transform .42s cubic-bezier(.22,.61,.36,1),opacity .42s;will-change:transform,opacity}

.chip{background:rgba(255,255,255,.22);padding:4px 10px;border-radius:999px;backdrop-filter:blur(4px);white-space:nowrap}
.right{display:flex;gap:8px;align-items:center}
.left{display:flex;gap:8px;align-items:center}
.miniBtn{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.45);color:#fff;font-size:14px;font-weight:800;width:30px;height:30px;border-radius:50%;cursor:pointer;line-height:1;-webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:center;padding:0}
.langBtn{position:absolute;top:calc(15px + env(safe-area-inset-top));right:14px;z-index:25;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.45);color:#fff;font-weight:800;font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;backdrop-filter:blur(4px)}
.bar{height:4px;background:rgba(255,255,255,.25);border-radius:3px;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;background:#fff;border-radius:3px;transition:width .4s}
.mid{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
.qlabel{font-size:12px;letter-spacing:2px;font-weight:800;opacity:.85;text-transform:uppercase}
.title{font-size:26px;line-height:1.2;font-weight:800;margin-top:14px;text-shadow:0 2px 12px rgba(0,0,0,.25)}
.hint{margin-top:22px;font-size:14px;font-weight:600;opacity:.9;display:flex;align-items:center;gap:8px}
.hint .dot{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:18px;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.12);opacity:1}}
.answer{margin-top:6px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain}
.answer.hidden{display:none}
.mid.revealed{justify-content:flex-start}
.mid.revealed .title{font-size:20px;margin-top:4px}
.mid.revealed .qlabel{display:none}
.mid.revealed .answer{flex:1 1 auto;min-height:0}
.sec{margin-top:13px}
.lab{font-size:11px;letter-spacing:1.5px;font-weight:800;text-transform:uppercase;opacity:.75;margin-bottom:4px}
.txt{font-size:15px;line-height:1.45}
.txt.small{font-size:12.5px;opacity:.82}
.hook{margin-top:14px;background:rgba(0,0,0,.3);border-radius:12px;padding:11px 13px;font-size:14px;font-weight:700}
.kws{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.kw{background:rgba(255,255,255,.18);font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}
.foot{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;color:#fff}
.btn.reveal{background:rgba(255,255,255,.25);backdrop-filter:blur(6px)}
.btn.again{background:rgba(0,0,0,.35)}
.btn.got{background:rgba(255,255,255,.3)}
.btn.next{background:rgba(0,0,0,.35)}
.overlay{position:absolute;inset:0;z-index:10;background:linear-gradient(170deg,#101425,#05060a);padding:26px 22px calc(26px + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay h1{font-size:26px;margin-bottom:8px;padding-right:70px}
.overlay p{font-size:14px;opacity:.85;line-height:1.5;margin-bottom:6px}
.examBox{margin-top:14px;background:rgba(255,255,255,.06);border-radius:12px;padding:12px 13px;font-size:12.5px;line-height:1.55}
.examBox b{color:#8ad}
.modes{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.mode{border:none;border-radius:16px;padding:15px 16px;font-size:15.5px;font-weight:800;cursor:pointer;text-align:left;color:#fff}
.mode small{display:block;font-weight:600;opacity:.85;font-size:12px;margin-top:3px}
.gLab{margin-top:16px;font-size:11px;letter-spacing:2px;font-weight:800;opacity:.6;text-transform:uppercase}
.hidden{display:none!important}
.statline{margin-top:14px;font-size:13px;opacity:.7}
.srcnote{margin-top:18px;font-size:11px;opacity:.5;line-height:1.5}
.swipehint{position:absolute;bottom:calc(96px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;font-size:12px;opacity:.7;pointer-events:none;z-index:5}
.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%) scale(.9);background:rgba(0,0,0,.75);padding:8px 18px;border-radius:999px;font-size:14px;font-weight:800;opacity:0;transition:.25s;pointer-events:none;z-index:20}
.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.qbody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:8px;touch-action:pan-y;overscroll-behavior:contain}
.passage{background:rgba(0,0,0,.3);border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.5;margin-bottom:12px}
.passage table{width:100%;border-collapse:collapse;font-size:13px}
.passage th,.passage td{border:1px solid rgba(255,255,255,.25);padding:5px 7px;text-align:center}
.qq{font-size:18px;font-weight:800;line-height:1.3;margin-bottom:12px}
.qq.big{font-size:26px;letter-spacing:4px;text-align:center;margin:10px 0 16px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.22);border-radius:12px;padding:12px 13px;font-size:14.5px;font-weight:600;color:#fff;cursor:pointer;text-align:left;display:flex;gap:9px;align-items:flex-start;line-height:1.35}
.opt .ltr{font-weight:800;opacity:.7}
.opt.correct{background:rgba(46,160,67,.55);border-color:#7ee2a0}
.opt.wrong{background:rgba(210,50,50,.55);border-color:#ff9d9d}
.opt.dim{opacity:.45}
.expl{margin-top:12px;background:rgba(0,0,0,.35);border-radius:12px;padding:11px 13px;font-size:13.5px;line-height:1.5}
.expl b{color:#8ad}
.card,.mid{cursor:pointer}
#app{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation}

/* ================= LEARN DECKS ================= */
const EUK_LEARN=[
{t:"The 7 EU institutions",t_pl:"7 instytucji UE",one:"Parliament, European Council, Council of the EU, Commission, Court of Justice, ECB, Court of Auditors.",one_pl:"Parlament, Rada Europejska, Rada UE, Komisja, Trybunał Sprawiedliwości, EBC, Trybunał Obrachunkowy.",say:"Seven institutions run the EU. Parliament and the Council of the EU make laws. The Commission proposes them and runs the day-to-day. The European Council (leaders) sets the big direction. The Court of Justice settles legal disputes, the ECB runs the euro, the Court of Auditors checks the money.",say_pl:"UE prowadzi siedem instytucji. Parlament i Rada UE uchwalają prawo. Komisja je proponuje i zajmuje się codziennym zarządzaniem. Rada Europejska (przywódcy) wyznacza kierunek. Trybunał Sprawiedliwości rozstrzyga spory prawne, EBC zarządza euro, a Trybunał Obrachunkowy kontroluje pieniądze.",ex:"A law's life: Commission proposes → Parliament + Council amend and adopt → Court of Justice interprets it if disputed → Auditors check how money under it was spent.",ex_pl:"Życie ustawy: Komisja proponuje → Parlament + Rada poprawiają i uchwalają → Trybunał interpretuje w razie sporu → audytorzy sprawdzają wydatki.",hook:"P-EC-C-C-CJ-ECB-CA — 'two councils, two courts, one bank, one parliament, one commission'.",hook_pl:"Dwie rady, dwa trybunały, jeden bank, jeden parlament, jedna komisja.",kw:["Art. 13 TEU","co-legislators","right of initiative"]},
{t:"European Commission",t_pl:"Komisja Europejska",one:"Executive: sole right of initiative for most legislation, guardian of the Treaties, one Commissioner per member state (27).",one_pl:"Egzekutywa: wyłączna inicjatywa ustawodawcza dla większości prawa, strażniczka traktatów, po jednym komisarzu z każdego państwa (27).",say:"The Commission is the EU's engine room. Only it can propose most new laws. It watches whether countries apply EU law (and can take them to Court), manages the budget, and negotiates trade deals. Each country has one Commissioner, but they must act for Europe, not for their capital.",say_pl:"Komisja to maszynownia UE. Tylko ona może proponować większość nowych przepisów. Pilnuje, czy państwa stosują prawo UE (i może je pozwać do Trybunału), zarządza budżetem i negocjuje umowy handlowe. Każde państwo ma jednego komisarza, ale działają oni dla Europy, nie dla swojej stolicy.",ex:"If a member state misses a directive's transposition deadline, the Commission opens an infringement procedure and can end up at the Court of Justice asking for fines.",ex_pl:"Gdy państwo nie wdroży dyrektywy na czas, Komisja wszczyna postępowanie o naruszenie i może zażądać kar przed Trybunałem.",hook:"Commission = Propose, Police, Purse, President (of the college).",hook_pl:"Komisja = Proponuje, Pilnuje, Portfel, Przewodniczy.",kw:["right of initiative","guardian of the Treaties","infringement","college of 27"]},
{t:"European Parliament",t_pl:"Parlament Europejski",one:"720 directly elected MEPs (since 2024); co-legislator with the Council; elects the Commission President; adopts the budget.",one_pl:"720 posłów z wyborów bezpośrednich (od 2024); współustawodawca z Radą; wybiera szefa Komisji; uchwala budżet.",say:"Parliament is the only directly elected institution — 720 MEPs since the 2024 elections. It amends and passes laws together with the Council, votes the Commission into office and can dismiss it with a censure motion, and signs off the budget. Seats are 'degressively proportional': small countries get relatively more per citizen.",say_pl:"Parlament to jedyna instytucja z wyborów bezpośrednich — 720 posłów od wyborów 2024. Razem z Radą poprawia i uchwala prawo, zatwierdza Komisję (i może ją odwołać wotum nieufności) oraz przyjmuje budżet. Mandaty są 'degresywnie proporcjonalne': małe kraje mają relatywnie więcej na obywatela.",ex:"In 2024 MEPs elected Ursula von der Leyen for a second term as Commission President — the Parliament's confirmation vote is a real power, not a formality.",ex_pl:"W 2024 europosłowie wybrali von der Leyen na drugą kadencję szefowej Komisji — głosowanie PE to realna władza, nie formalność.",hook:"720 MEPs · elects the Commission · half of the budgetary authority.",hook_pl:"720 posłów · wybiera Komisję · połowa władzy budżetowej.",kw:["720 MEPs","co-legislator","censure motion","Strasbourg/Brussels"]},
{t:"Council of the EU vs European Council vs Council of Europe",t_pl:"Rada UE vs Rada Europejska vs Rada Europy",one:"Ministers legislating vs leaders setting direction vs a separate non-EU organisation (human rights, Strasbourg).",one_pl:"Ministrowie uchwalają prawo vs przywódcy wyznaczają kierunek vs odrębna organizacja spoza UE (prawa człowieka, Strasburg).",say:"Three names, three different things. The Council of the EU is national ministers adopting laws with Parliament — its presidency rotates every six months. The European Council is presidents and prime ministers meeting at summits to set priorities; it does not legislate. The Council of Europe is not an EU body at all — 46 states, the European Convention on Human Rights, its own court in Strasbourg.",say_pl:"Trzy nazwy, trzy różne rzeczy. Rada UE to ministrowie krajowi uchwalający prawo z Parlamentem — prezydencja rotuje co pół roku. Rada Europejska to prezydenci i premierzy na szczytach, wyznaczają priorytety, ale nie legislują. Rada Europy to w ogóle nie organ UE — 46 państw, Europejska Konwencja Praw Człowieka, własny trybunał w Strasburgu.",ex:"Classic trap question: the European Court of Human Rights belongs to the Council of Europe, not the EU.",ex_pl:"Klasyczna pułapka: Europejski Trybunał Praw Człowieka należy do Rady Europy, nie do UE.",hook:"Ministers make law · Leaders make direction · Strasbourg 46 makes human rights.",hook_pl:"Ministrowie = prawo · Przywódcy = kierunek · Strasburg 46 = prawa człowieka.",kw:["rotating presidency","summits","ECHR","46 states"]},
{t:"The courts and the money watchdogs",t_pl:"Trybunały i strażnicy pieniędzy",one:"CJEU (Luxembourg) interprets EU law; the Court of Auditors audits spending; the Ombudsman handles maladministration.",one_pl:"TSUE (Luksemburg) interpretuje prawo UE; Trybunał Obrachunkowy audytuje wydatki; Rzecznik zajmuje się złą administracją.",say:"The Court of Justice of the EU sits in Luxembourg and makes sure EU law is applied the same everywhere — national judges send it 'preliminary questions'. The Court of Auditors, also Luxembourg, checks the accounts. The European Ombudsman investigates complaints about bad administration by EU bodies — anything from refused document access to unfair recruitment.",say_pl:"Trybunał Sprawiedliwości UE w Luksemburgu pilnuje, by prawo UE stosowano wszędzie tak samo — sędziowie krajowi ślą mu 'pytania prejudycjalne'. Trybunał Obrachunkowy, też Luksemburg, sprawdza rachunki. Europejski Rzecznik Praw Obywatelskich bada skargi na złą administrację organów UE — od odmowy dostępu do dokumentów po nieuczciwą rekrutację.",ex:"A Polish court unsure how to read an EU consumer directive can pause the case and ask the CJEU for a preliminary ruling — that mechanism built most of EU case law.",ex_pl:"Polski sąd niepewny wykładni dyrektywy konsumenckiej może zawiesić sprawę i spytać TSUE — na tym mechanizmie wyrosło orzecznictwo UE.",hook:"Luxembourg twins: one court for law, one for money.",hook_pl:"Luksemburskie bliźniaki: jeden trybunał od prawa, drugi od pieniędzy.",kw:["preliminary ruling","CJEU","ECA","Ombudsman"]},
{t:"Ordinary legislative procedure (OLP)",t_pl:"Zwykła procedura ustawodawcza",one:"Commission proposes; Parliament and Council co-decide in up to three readings; both must agree the same text.",one_pl:"Komisja proponuje; Parlament i Rada współdecydują w maks. trzech czytaniach; obie muszą przyjąć ten sam tekst.",say:"The standard way EU laws pass. The Commission tables a proposal. Parliament adopts a position; the Council adopts its own. If they differ, texts bounce between them — up to three readings, with a conciliation committee at the end if needed. In practice most files settle early in informal 'trilogues'. Both institutions must approve the identical text or there is no law.",say_pl:"Standardowa ścieżka prawa UE. Komisja składa projekt. Parlament przyjmuje stanowisko, Rada swoje. Gdy się różnią, tekst krąży między nimi — do trzech czytań, na końcu ewentualnie komitet pojednawczy. W praktyce większość spraw domyka się wcześnie w nieformalnych 'trilogach'. Obie instytucje muszą przyjąć identyczny tekst, inaczej prawa nie ma.",ex:"Most single-market, environment and consumer legislation goes through OLP — it covers around 85 policy areas since Lisbon.",ex_pl:"Większość prawa o jednolitym rynku, środowisku i konsumentach idzie tą ścieżką — od Lizbony ok. 85 obszarów.",hook:"Propose → Position → Ping-pong → (Trilogue) → Same text or no law.",hook_pl:"Projekt → Stanowiska → Ping-pong → (Trilog) → Ten sam tekst albo nic.",kw:["co-decision","trilogue","three readings","conciliation"]},
{t:"Treaty timeline",t_pl:"Oś czasu traktatów",one:"Paris '51 (ECSC) → Rome '57 (EEC, Euratom) → Single European Act '86 → Maastricht '92 (EU) → Amsterdam '97 → Nice '01 → Lisbon '07 (in force 2009).",one_pl:"Paryż '51 (EWWiS) → Rzym '57 (EWG, Euratom) → Jednolity Akt Europejski '86 → Maastricht '92 (UE) → Amsterdam '97 → Nicea '01 → Lizbona '07 (w mocy 2009).",say:"Seven dates tell the story. 1951 Paris: coal and steel pooled. 1957 Rome: the common market. 1986 Single European Act: deadline for the single market by 1992. 1992 Maastricht: the EU is born, euro planned, EU citizenship created. Amsterdam and Nice tidied things up for enlargement. 2007 Lisbon (in force December 2009): current rulebook — TEU + TFEU, more Parliament power, EU legal personality.",say_pl:"Siedem dat opowiada całość. 1951 Paryż: wspólny węgiel i stal. 1957 Rzym: wspólny rynek. 1986 JAE: termin jednolitego rynku na 1992. 1992 Maastricht: rodzi się UE, plan euro, obywatelstwo UE. Amsterdam i Nicea porządkują przed rozszerzeniem. 2007 Lizbona (w mocy od grudnia 2009): obecny regulamin — TUE + TFUE, silniejszy Parlament, osobowość prawna UE.",ex:"Maastricht created the euro's blueprint and EU citizenship; Lisbon created the permanent European Council President and made the Charter of Fundamental Rights binding.",ex_pl:"Maastricht dał plan euro i obywatelstwo UE; Lizbona — stałego szefa Rady Europejskiej i wiążącą Kartę Praw Podstawowych.",hook:"Paris → Rome → SEA → Maastricht → Amsterdam → Nice → Lisbon: 51-57-86-92-97-01-07.",hook_pl:"Paryż → Rzym → JAE → Maastricht → Amsterdam → Nicea → Lizbona: 51-57-86-92-97-01-07.",kw:["ECSC 1951","Rome 1957","Maastricht 1992","Lisbon 2009"]},
{t:"Regulation, directive, decision, recommendation",t_pl:"Rozporządzenie, dyrektywa, decyzja, zalecenie",one:"Regulation: directly applicable everywhere. Directive: sets a goal, states transpose. Decision: binding on its addressees. Recommendation/opinion: not binding.",one_pl:"Rozporządzenie: stosowane wprost wszędzie. Dyrektywa: cel do wdrożenia przez państwa. Decyzja: wiąże adresatów. Zalecenie/opinia: niewiążące.",say:"Four instruments, one ladder of force. A regulation applies automatically and identically in all member states the day it enters into force — like GDPR. A directive sets the result but lets each country write its own implementing law by a deadline. A decision binds only whoever it is addressed to — a country or a company. Recommendations and opinions carry no legal force.",say_pl:"Cztery instrumenty, jedna drabina mocy. Rozporządzenie działa automatycznie i identycznie we wszystkich państwach od dnia wejścia w życie — jak RODO. Dyrektywa wyznacza rezultat, ale każdy kraj sam pisze przepisy wdrażające w terminie. Decyzja wiąże tylko adresata — państwo albo firmę. Zalecenia i opinie nie mają mocy prawnej.",ex:"GDPR is a regulation (same text applies from Lisbon to Ljubljana); the Work-Life Balance Directive needed each state to pass national rules.",ex_pl:"RODO to rozporządzenie (ten sam tekst od Lizbony po Lublanę); dyrektywa work-life balance wymagała krajowych ustaw.",hook:"Regulation = ready-made · Directive = DIY with a deadline · Decision = addressed mail.",hook_pl:"Rozporządzenie = gotowiec · Dyrektywa = zrób-to-sam z terminem · Decyzja = list do adresata.",kw:["direct applicability","transposition","Art. 288 TFEU"]},
{t:"EU competences",t_pl:"Kompetencje UE",one:"Exclusive (only EU: customs, competition, euro, trade), shared (single market, environment, energy…), supporting (culture, education, health).",one_pl:"Wyłączne (tylko UE: cła, konkurencja, euro, handel), dzielone (rynek, środowisko, energia…), wspierające (kultura, edukacja, zdrowie).",say:"Who may act? In exclusive areas only the EU legislates — customs union, competition rules, monetary policy for the euro, common commercial policy, marine conservation. In shared areas both can, but states only where the EU hasn't — single market, environment, agriculture, energy, cohesion. In supporting areas the EU only coordinates or complements — education, culture, tourism, health.",say_pl:"Kto może działać? W obszarach wyłącznych legisluje tylko UE — unia celna, konkurencja, polityka pieniężna euro, wspólna polityka handlowa, ochrona zasobów morza. W dzielonych mogą oba poziomy, ale państwa tylko tam, gdzie UE nie zajęła pola — rynek, środowisko, rolnictwo, energia, spójność. W obszarach wspierających UE tylko koordynuje — edukacja, kultura, turystyka, zdrowie.",ex:"Trade deals: Brussels negotiates for all 27 (exclusive). School curricula: purely national, EU can only support (Erasmus).",ex_pl:"Umowy handlowe: Bruksela negocjuje za 27 (wyłączne). Programy szkolne: czysto krajowe, UE tylko wspiera (Erasmus).",hook:"Only-EU / Both / EU-just-helps.",hook_pl:"Tylko-UE / Oba / UE-tylko-pomaga.",kw:["Art. 3-6 TFEU","exclusive","shared","supporting"]},
{t:"Subsidiarity and proportionality",t_pl:"Pomocniczość i proporcjonalność",one:"EU acts (outside exclusive competence) only if the goal is better achieved at EU level; and never more than necessary.",one_pl:"UE działa (poza kompetencjami wyłącznymi) tylko gdy cel lepiej osiągnąć na poziomie UE; i nigdy ponad konieczność.",say:"Two brakes on EU action. Subsidiarity: in shared areas, the EU should act only when member states can't achieve the objective well enough alone and the EU can do it better — decisions as close to citizens as possible. Proportionality: even then, do not exceed what is necessary. National parliaments police subsidiarity with 'yellow cards' — reasoned opinions that force the Commission to review a proposal.",say_pl:"Dwa hamulce działań UE. Pomocniczość: w obszarach dzielonych UE działa tylko wtedy, gdy państwa same nie osiągną celu wystarczająco dobrze, a UE zrobi to lepiej — decyzje jak najbliżej obywateli. Proporcjonalność: nawet wtedy nie więcej, niż trzeba. Parlamenty narodowe pilnują pomocniczości 'żółtymi kartkami' — uzasadnione opinie zmuszają Komisję do rewizji projektu.",ex:"Cross-border air-passenger rights need EU rules (airlines cross borders); local playground safety does not.",ex_pl:"Prawa pasażerów lotniczych wymagają reguł UE (linie latają przez granice); bezpieczeństwo osiedlowego placu zabaw — nie.",hook:"Subsidiarity = should the EU act? Proportionality = how much?",hook_pl:"Pomocniczość = czy UE ma działać? Proporcjonalność = jak mocno?",kw:["Art. 5 TEU","yellow card","national parliaments"]},
{t:"Voting in the Council: QMV",t_pl:"Głosowanie w Radzie: QMV",one:"Qualified majority = 55% of member states (15 of 27) representing 65% of the EU population; blocking minority needs 4+ states.",one_pl:"Większość kwalifikowana = 55% państw (15 z 27) reprezentujących 65% ludności UE; mniejszość blokująca to min. 4 państwa.",say:"Most Council decisions use qualified majority: at least 55% of countries — that's 15 of 27 — which together hold at least 65% of the EU's population. To block, you need at least four states covering over 35% of the population, so three big countries alone can't stop a law. Sensitive areas — tax, foreign policy, enlargement — still need unanimity.",say_pl:"Większość decyzji Rady zapada większością kwalifikowaną: co najmniej 55% państw — czyli 15 z 27 — reprezentujących łącznie co najmniej 65% ludności UE. Do zablokowania trzeba co najmniej czterech państw z ponad 35% ludności, więc trzy duże kraje same nie zatrzymają prawa. Obszary wrażliwe — podatki, polityka zagraniczna, rozszerzenie — nadal wymagają jednomyślności.",ex:"That's why a single government can veto sanctions (unanimity in CFSP) but cannot alone stop a single-market regulation (QMV).",ex_pl:"Dlatego jeden rząd może zawetować sankcje (jednomyślność w WPZiB), ale sam nie zatrzyma rozporządzenia rynkowego (QMV).",hook:"55-65 double majority; 4 to block.",hook_pl:"Podwójna większość 55-65; 4 do blokady.",kw:["double majority","blocking minority","unanimity areas"]},
{t:"Enlargement and the Copenhagen criteria",t_pl:"Rozszerzenie i kryteria kopenhaskie",one:"From 6 founders to 27 today; joining requires stable democratic institutions, a functioning market economy, and capacity to apply the acquis.",one_pl:"Od 6 założycieli do 27 dziś; wejście wymaga stabilnej demokracji, sprawnej gospodarki rynkowej i zdolności stosowania acquis.",say:"Six founders in the 1950s: Belgium, France, Germany, Italy, Luxembourg, the Netherlands. Waves added the UK/Ireland/Denmark (1973), Greece (1981), Spain/Portugal (1986), Austria/Finland/Sweden (1995), the big 2004 eastern round including Poland, then Bulgaria/Romania 2007 and Croatia 2013 — the most recent member. The UK left in 2020. Candidates must meet the 1993 Copenhagen criteria: democracy and rule of law, market economy, ability to take on EU law (the acquis).",say_pl:"Sześciu założycieli w latach 50.: Belgia, Francja, Niemcy, Włochy, Luksemburg, Holandia. Fale: UK/Irlandia/Dania (1973), Grecja (1981), Hiszpania/Portugalia (1986), Austria/Finlandia/Szwecja (1995), wielka runda wschodnia 2004 z Polską, potem Bułgaria/Rumunia 2007 i Chorwacja 2013 — najnowszy członek. UK wyszło w 2020. Kandydaci muszą spełnić kryteria kopenhaskie z 1993: demokracja i praworządność, gospodarka rynkowa, zdolność przyjęcia prawa UE (acquis).",ex:"Ukraine and Moldova received candidate status in June 2022; accession talks depend on meeting the Copenhagen criteria chapter by chapter.",ex_pl:"Ukraina i Mołdawia dostały status kandydata w czerwcu 2022; negocjacje zależą od spełniania kryteriów rozdział po rozdziale.",hook:"6 → 27 · last in: Croatia 2013 · out: UK 2020 · gate: Copenhagen 1993.",hook_pl:"6 → 27 · ostatnia: Chorwacja 2013 · wyszło: UK 2020 · brama: Kopenhaga 1993.",kw:["Copenhagen criteria","acquis","2004 enlargement","candidate status"]},
{t:"The euro and the ECB",t_pl:"Euro i EBC",one:"Single currency since 1999 (cash 2002); ECB in Frankfurt targets price stability; joining requires the convergence criteria.",one_pl:"Wspólna waluta od 1999 (gotówka 2002); EBC we Frankfurcie celuje w stabilność cen; wejście wymaga kryteriów konwergencji.",say:"The euro launched for accounting in 1999 and as cash in 2002. The European Central Bank in Frankfurt sets interest rates for the euro area with one primary objective: price stability. Countries join by meeting the Maastricht convergence criteria — low inflation, sound public finances (deficit under 3% of GDP, debt around 60%), stable exchange rate, low long-term rates. Croatia adopted the euro in 2023.",say_pl:"Euro ruszyło księgowo w 1999, a jako gotówka w 2002. Europejski Bank Centralny we Frankfurcie ustala stopy dla strefy euro z jednym nadrzędnym celem: stabilnością cen. Kraje wchodzą po spełnieniu kryteriów konwergencji z Maastricht — niska inflacja, zdrowe finanse (deficyt poniżej 3% PKB, dług ok. 60%), stabilny kurs, niskie stopy długoterminowe. Chorwacja przyjęła euro w 2023.",ex:"Denmark has a Treaty opt-out from the euro; the other non-euro members are in principle expected to join once ready.",ex_pl:"Dania ma traktatowy opt-out od euro; pozostałe kraje spoza strefy co do zasady mają dołączyć, gdy będą gotowe.",hook:"1999 born · 2002 cash · Frankfurt · price stability first.",hook_pl:"1999 start · 2002 gotówka · Frankfurt · najpierw stabilność cen.",kw:["convergence criteria","price stability","Eurogroup","opt-out"]},
{t:"Schengen area",t_pl:"Strefa Schengen",one:"Border-check-free travel zone; most EU states plus non-EU members like Norway, Iceland, Switzerland; Ireland stays out by choice.",one_pl:"Strefa bez kontroli granicznych; większość UE plus kraje spoza UE jak Norwegia, Islandia, Szwajcaria; Irlandia poza z wyboru.",say:"Schengen abolished checks at internal borders — you drive from Portugal to Poland without showing a passport. It includes most EU countries plus non-EU Norway, Iceland, Switzerland and Liechtenstein. Ireland keeps its own arrangement. Members compensate with a strong external border, shared visa rules and the Schengen Information System. States may reintroduce internal checks temporarily for security.",say_pl:"Schengen zniosło kontrole na granicach wewnętrznych — jedziesz z Portugalii do Polski bez paszportu. Obejmuje większość krajów UE plus Norwegię, Islandię, Szwajcarię i Liechtenstein spoza UE. Irlandia ma własne rozwiązanie. Rekompensatą jest silna granica zewnętrzna, wspólne wizy i System Informacyjny Schengen. Państwa mogą czasowo przywracać kontrole ze względów bezpieczeństwa.",ex:"Trap: Schengen ≠ EU. Switzerland is in Schengen but not the EU; Ireland is in the EU but not in Schengen's passport-free core.",ex_pl:"Pułapka: Schengen ≠ UE. Szwajcaria jest w Schengen, ale nie w UE; Irlandia w UE, ale poza strefą bez paszportów.",hook:"Free inside, strong outside — and Schengen ≠ EU membership.",hook_pl:"Wolność w środku, twarda granica na zewnątrz — i Schengen ≠ UE.",kw:["internal borders","SIS","external border","temporary checks"]},
{t:"The EU budget (MFF)",t_pl:"Budżet UE (WRF)",one:"Seven-year Multiannual Financial Framework; funded by 'own resources' (GNI-based, VAT-based, customs); Parliament + Council adopt annual budgets.",one_pl:"Siedmioletnie Wieloletnie Ramy Finansowe; finansowane z 'zasobów własnych' (składka od DNB, VAT, cła); budżety roczne uchwalają Parlament i Rada.",say:"The EU plans money in seven-year frameworks — the MFF. Revenue comes from 'own resources': mostly a GNI-based contribution from each state, plus VAT-based revenue, customs duties and a plastics levy. The biggest spending blocks are cohesion (helping poorer regions) and agriculture, with a growing share for research, digital and borders. NextGenerationEU added a debt-funded recovery instrument after COVID. The Court of Auditors checks the spending.",say_pl:"UE planuje pieniądze w siedmioletnich ramach — WRF. Dochody to 'zasoby własne': głównie składka od DNB każdego państwa, plus wpływy oparte na VAT, cła i opłata od plastiku. Największe bloki wydatków to spójność (wsparcie biedniejszych regionów) i rolnictwo, rośnie udział badań, cyfryzacji i granic. NextGenerationEU dodało po COVID instrument odbudowy finansowany długiem. Wydatki kontroluje Trybunał Obrachunkowy.",ex:"Roughly: two thirds of the budget has long gone to cohesion + CAP together — the classic exam statistic.",ex_pl:"Z grubsza: dwie trzecie budżetu od lat idzie łącznie na spójność + WPR — klasyczna statystyka egzaminacyjna.",hook:"7 years · own resources · cohesion + CAP eat most of the pie.",hook_pl:"7 lat · zasoby własne · spójność + WPR zjadają większość tortu.",kw:["MFF","own resources","NextGenerationEU","cohesion","CAP"]},
{t:"The single market and four freedoms",t_pl:"Jednolity rynek i cztery swobody",one:"Free movement of goods, services, capital and persons — the core of European integration since 1993.",one_pl:"Swobodny przepływ towarów, usług, kapitału i osób — rdzeń integracji od 1993.",say:"The single market means four freedoms: goods circulate without customs duties or quantitative restrictions; services can be provided cross-border; capital moves freely; and people can live, work and study in any member state. Completed on paper in 1993 after the Single European Act's programme. Mutual recognition — if it's lawfully sold in one state, in principle it can be sold in another — does much of the work.",say_pl:"Jednolity rynek to cztery swobody: towary krążą bez ceł i ograniczeń ilościowych; usługi można świadczyć transgranicznie; kapitał płynie swobodnie; ludzie mogą mieszkać, pracować i studiować w każdym państwie. Formalnie domknięty w 1993 po programie JAE. Dużą część roboty robi wzajemne uznawanie — co legalnie sprzedawane w jednym kraju, co do zasady może być sprzedawane w innym.",ex:"Cassis de Dijon (1979): Germany couldn't ban a French liqueur just because its alcohol content didn't match German rules — mutual recognition was born.",ex_pl:"Cassis de Dijon (1979): Niemcy nie mogły zakazać francuskiego likieru tylko dlatego, że moc nie pasowała do ich norm — narodziny wzajemnego uznawania.",hook:"Goods · Services · Capital · Persons — GSCP since '93.",hook_pl:"Towary · Usługi · Kapitał · Osoby — od '93.",kw:["four freedoms","mutual recognition","Cassis de Dijon","1993"]},
{t:"EU citizenship and citizens' rights",t_pl:"Obywatelstwo UE i prawa obywateli",one:"Created by Maastricht; adds to national citizenship: free movement, local + EP voting rights abroad, consular protection, petitions, the Citizens' Initiative.",one_pl:"Utworzone w Maastricht; uzupełnia krajowe: swoboda przemieszczania, prawa wyborcze lokalne i do PE za granicą, ochrona konsularna, petycje, inicjatywa obywatelska.",say:"Every national of a member state is automatically an EU citizen — it complements, never replaces, national citizenship. It brings the right to move and reside freely, to vote and stand in local and European elections where you live, consular protection from any member state's embassy outside the EU, the right to petition Parliament and complain to the Ombudsman, and the European Citizens' Initiative: one million signatures from at least seven member states can invite the Commission to propose legislation.",say_pl:"Każdy obywatel państwa członkowskiego jest automatycznie obywatelem UE — to uzupełnia, nigdy nie zastępuje, obywatelstwa krajowego. Daje prawo do swobodnego przemieszczania się i pobytu, głosowania i kandydowania w wyborach lokalnych i europejskich w miejscu zamieszkania, ochronę konsularną ambasady dowolnego państwa UE poza Unią, prawo petycji do Parlamentu i skargi do Rzecznika oraz Europejską Inicjatywę Obywatelską: milion podpisów z co najmniej siedmiu państw może wezwać Komisję do zaproponowania prawa.",ex:"A Pole living in Lisbon votes for Portuguese MEPs and in Lisbon's local elections — without becoming Portuguese.",ex_pl:"Polak w Lizbonie głosuje na portugalskich europosłów i w lizbońskich wyborach lokalnych — nie stając się Portugalczykiem.",hook:"Move · Vote · Protect · Petition · 1 million voices.",hook_pl:"Mieszkaj · Głosuj · Chroń · Petycjonuj · Milion głosów.",kw:["Maastricht","ECI","consular protection","Art. 20 TFEU"]},
{t:"Green Deal and 2024-29 priorities",t_pl:"Zielony Ład i priorytety 2024-29",one:"Climate neutrality by 2050, -55% emissions by 2030 ('Fit for 55') made binding by the European Climate Law; current agenda adds competitiveness, defence and security.",one_pl:"Neutralność klimatyczna do 2050, -55% emisji do 2030 ('Fit for 55') wiążące mocą Europejskiego prawa o klimacie; obecna agenda dodaje konkurencyjność, obronność i bezpieczeństwo.",say:"The European Green Deal is the flagship growth-and-climate strategy: legally binding climate neutrality by 2050 and at least -55% net emissions by 2030, delivered through the Fit for 55 package — carbon pricing (ETS), CO2 standards for cars, a carbon border levy (CBAM). The 2024-2029 political cycle pairs it with competitiveness (Draghi-report follow-up), economic security, defence readiness and migration reform.",say_pl:"Europejski Zielony Ład to flagowa strategia wzrostu i klimatu: prawnie wiążąca neutralność klimatyczna do 2050 i co najmniej -55% emisji netto do 2030, realizowane pakietem Fit for 55 — opłaty za emisje (ETS), normy CO2 dla aut, graniczny podatek węglowy (CBAM). Cykl 2024-2029 łączy to z konkurencyjnością (wnioski z raportu Draghiego), bezpieczeństwem ekonomicznym, gotowością obronną i reformą migracji.",ex:"CBAM makes importers of steel or cement pay for embedded carbon — protecting EU industry from 'carbon leakage'.",ex_pl:"CBAM każe importerom stali czy cementu płacić za wbudowany węgiel — chroni przemysł UE przed 'ucieczką emisji'.",hook:"2050 neutral · 2030 -55% · Fit for 55 · ETS + CBAM.",hook_pl:"2050 neutralność · 2030 -55% · Fit for 55 · ETS + CBAM.",kw:["Climate Law","Fit for 55","ETS","CBAM","competitiveness"]},
{t:"Who's who (2024-2029 cycle)",t_pl:"Kto jest kim (cykl 2024-2029)",one:"Commission: von der Leyen (2nd term). European Council: Costa. Parliament: Metsola. HR/VP: Kallas. ECB: Lagarde.",one_pl:"Komisja: von der Leyen (2. kadencja). Rada Europejska: Costa. Parlament: Metsola. WP/WP: Kallas. EBC: Lagarde.",say:"For the current institutional cycle: Ursula von der Leyen leads the Commission for a second term. António Costa, former Portuguese PM, chairs the European Council summits. Roberta Metsola presides over Parliament. Kaja Kallas, former Estonian PM, is High Representative for foreign affairs and a Commission Vice-President. Christine Lagarde heads the ECB. The Council presidency still rotates among member states every six months.",say_pl:"W obecnym cyklu: Ursula von der Leyen kieruje Komisją drugą kadencję. António Costa, były premier Portugalii, prowadzi szczyty Rady Europejskiej. Roberta Metsola przewodniczy Parlamentowi. Kaja Kallas, była premier Estonii, jest Wysoką Przedstawiciel ds. zagranicznych i wiceszefową Komisji. Christine Lagarde kieruje EBC. Prezydencja Rady wciąż rotuje co pół roku.",ex:"The HR/VP 'double hat': chairs ministers' Foreign Affairs Council AND sits in the Commission — bridging the two worlds.",ex_pl:"'Podwójny kapelusz' Wysokiego Przedstawiciela: prowadzi Radę do Spraw Zagranicznych I zasiada w Komisji — most między światami.",hook:"VdL² · Costa chairs · Metsola speaks · Kallas abroad · Lagarde pays.",hook_pl:"VdL² · Costa prowadzi · Metsola przewodniczy · Kallas za granicą · Lagarde płaci.",kw:["von der Leyen","Costa","Metsola","Kallas","rotating presidency"]}
];
const EUFTE_LEARN=[
{t:"What EUFTE actually is",t_pl:"Czym właściwie jest EUFTE",one:"A 40-minute free-text essay on an EU topic, written in your language 2, based on a source document EPSO publishes about two weeks before the test.",one_pl:"40-minutowy esej na temat unijny, pisany w języku 2, na bazie dokumentu publikowanego przez EPSO ok. dwa tygodnie przed testem.",say:"EUFTE = 'EU free-text essay'. You get an assignment linked to a document on a general EU topic — the document is released roughly two weeks in advance, so you can study it. On the day you write a structured response in 40 minutes in your second language. Pass mark 5/10; it carries 15% of your final score and is only marked if you passed everything else.",say_pl:"EUFTE = 'esej otwarty o UE'. Dostajesz zadanie powiązane z dokumentem na ogólny temat unijny — dokument wychodzi ok. dwa tygodnie wcześniej, więc możesz go przestudiować. W dniu testu piszesz ustrukturyzowaną odpowiedź w 40 minut w swoim drugim języku. Próg 5/10; waży 15% wyniku i jest oceniany tylko, jeśli zdałeś resztę.",ex:"Think of it as an open-book policy brief where you saw the 'book' two weeks early — not knowing the document inside out is an unforced error.",ex_pl:"To jak brief polityczny z otwartą książką, którą widziałeś dwa tygodnie wcześniej — nieznajomość dokumentu to błąd niewymuszony.",hook:"40 min · L2 · known document · 15% · pass 5/10.",hook_pl:"40 min · L2 · znany dokument · 15% · próg 5/10.",kw:["free text","language 2","pre-released document","15%"]},
{t:"Use the pre-released document properly",t_pl:"Wykorzystaj dokument jak należy",one:"Read it many times, map its structure, extract key figures and terms, and pre-draft arguments it invites.",one_pl:"Czytaj wielokrotnie, rozrysuj strukturę, wynotuj liczby i pojęcia, przygotuj szkielety argumentów.",say:"The document is the exam. Read it several times over the two weeks: summarise each section in one line, memorise 3-5 hard facts or figures from it, list its main tensions (costs vs benefits, EU vs national level, short vs long term). Then anticipate assignments: 'discuss the challenges', 'propose measures', 'assess the impact'. Pre-draft an intro pattern and arguments for each plausible angle.",say_pl:"Dokument to egzamin. Czytaj go wielokrotnie przez dwa tygodnie: streść każdą sekcję jednym zdaniem, zapamiętaj 3-5 twardych faktów lub liczb, wypisz główne napięcia (koszty vs korzyści, poziom UE vs krajowy, krótki vs długi horyzont). Przewiduj polecenia: 'omów wyzwania', 'zaproponuj działania', 'oceń skutki'. Przygotuj wzór wstępu i argumenty pod każdy prawdopodobny kąt.",ex:"If the document is about skills shortages, expect prompts on causes, EU-level responses, or trade-offs — prepare all three skeletons.",ex_pl:"Jeśli dokument jest o niedoborze kompetencji, spodziewaj się pytań o przyczyny, odpowiedzi UE albo kompromisy — przygotuj wszystkie trzy szkielety.",hook:"Know the doc → predict the prompts → pre-build skeletons.",hook_pl:"Znaj dokument → przewiduj polecenia → buduj szkielety.",kw:["mapping","key figures","anticipated prompts"]},
{t:"Structure that scores",t_pl:"Struktura, która punktuje",one:"Intro (reframe the task) → 2-3 argument paragraphs with examples → conclusion with a position. Signpost everything.",one_pl:"Wstęp (przeformułuj zadanie) → 2-3 akapity argumentów z przykładami → wniosek ze stanowiskiem. Wszystko sygnalizuj.",say:"Markers reward organisation they can see. Open by restating the task in your own words and announcing your line. Then two or three body paragraphs, each with one idea, one piece of evidence from the document, and one link back to the question. Close with a short conclusion that takes a position. Use connectors — 'first', 'however', 'therefore' — as visible signposts.",say_pl:"Oceniający nagradzają widoczną organizację. Zacznij od przeformułowania zadania własnymi słowami i zapowiedzi tezy. Potem dwa-trzy akapity: każdy z jedną myślą, jednym dowodem z dokumentu i jednym nawiązaniem do pytania. Zamknij krótkim wnioskiem ze stanowiskiem. Używaj łączników — 'po pierwsze', 'jednak', 'dlatego' — jako drogowskazów.",ex:"A safe skeleton: 'The document raises X. This essay argues Y for two reasons... First... Second... In conclusion...'",ex_pl:"Bezpieczny szkielet: 'Dokument porusza X. Esej dowodzi Y z dwóch powodów… Po pierwsze… Po drugie… Podsumowując…'",hook:"1 intro + 2-3 ideas + 1 conclusion = 5 paragraphs.",hook_pl:"1 wstęp + 2-3 myśli + 1 wniosek = 5 akapitów.",kw:["signposting","one idea per paragraph","evidence from the doc"]},
{t:"Timing the 40 minutes",t_pl:"Rozkład 40 minut",one:"5 plan → 30 write → 5 reread. Never skip the plan or the reread.",one_pl:"5 plan → 30 pisanie → 5 sprawdzenie. Nigdy nie pomijaj planu ani sprawdzenia.",say:"Forty minutes disappears fast. Spend five planning: pick your line, jot the paragraph skeleton, choose which document facts you'll use. Write for thirty, keeping paragraphs short. Keep the last five to reread — fix agreement errors, missing words and clumsy sentences; in an L2 those five minutes are worth more than five extra lines of text.",say_pl:"Czterdzieści minut znika szybko. Pięć na plan: wybierz tezę, zanotuj szkielet akapitów, wybierz fakty z dokumentu. Trzydzieści na pisanie, krótkimi akapitami. Ostatnie pięć na ponowne czytanie — popraw błędy gramatyczne, brakujące słowa, koślawe zdania; w języku obcym te pięć minut jest warte więcej niż pięć dodatkowych linijek.",ex:"An unfinished conclusion costs more than a shorter body — if time runs out, jump to the conclusion and write it.",ex_pl:"Brak wniosku kosztuje więcej niż krótsze rozwinięcie — gdy czas się kończy, przeskocz do konkluzji i ją napisz.",hook:"5-30-5.",hook_pl:"5-30-5.",kw:["plan","reread","conclusion first if late"]},
{t:"Language 2 quality",t_pl:"Jakość języka 2",one:"You're judged on clarity, vocabulary range and accuracy — simple correct sentences beat ambitious broken ones.",one_pl:"Oceniają jasność, zasób słownictwa i poprawność — proste poprawne zdania biją ambitne połamane.",say:"Write the language you actually control. Short, correct sentences with precise connectors score better than long ones full of errors. Build a personal bank of EU collocations before the exam — 'to strike a balance', 'to address a challenge', 'at EU level', 'member states' — and reusable frames for introducing, contrasting and concluding. Avoid idioms you half-remember.",say_pl:"Pisz językiem, który naprawdę kontrolujesz. Krótkie poprawne zdania z precyzyjnymi łącznikami punktują lepiej niż długie pełne błędów. Zbuduj przed egzaminem bank unijnych kolokacji — 'to strike a balance', 'to address a challenge', 'at EU level' — oraz gotowe ramy wprowadzania, kontrastowania i podsumowania. Unikaj idiomów, które pamiętasz w połowie.",ex:"'The EU should address this challenge at two levels' — simple, correct, exam-proof.",ex_pl:"'The EU should address this challenge at two levels' — proste, poprawne, egzaminoodporne.",hook:"Correct and clear beats complex and cracked.",hook_pl:"Poprawnie i jasno bije skomplikowanie i krzywo.",kw:["collocations","connectors","accuracy over ambition"]},
{t:"Common EUFTE mistakes",t_pl:"Typowe błędy w EUFTE",one:"Ignoring the document, describing instead of arguing, no conclusion, one giant paragraph, memorised text pasted in.",one_pl:"Ignorowanie dokumentu, opis zamiast argumentacji, brak wniosku, jeden wielki akapit, wklejony wykuty tekst.",say:"The recurring fails: writing a generic essay that never uses the pre-released document; summarising the document instead of answering the assignment; running out of time before the conclusion; a single wall of text with no paragraphs; and pasting a memorised model answer that doesn't fit the prompt. Every one of them is avoidable with the 5-30-5 routine and a skeleton.",say_pl:"Powtarzalne wpadki: generyczny esej bez użycia dokumentu; streszczenie dokumentu zamiast odpowiedzi na polecenie; brak czasu na wniosek; jedna ściana tekstu bez akapitów; wklejona wykuta odpowiedź nietrafiająca w polecenie. Każdej z nich zapobiega rutyna 5-30-5 i szkielet.",ex:"Markers can tell a pre-memorised essay instantly — pre-build skeletons and facts, not full sentences.",ex_pl:"Oceniający natychmiast poznają wykuty esej — przygotowuj szkielety i fakty, nie całe zdania.",hook:"Use the doc · answer the question · always conclude.",hook_pl:"Użyj dokumentu · odpowiedz na pytanie · zawsze konkluduj.",kw:["answer the prompt","paragraphing","no canned essays"]},
{t:"Training plan for EUFTE",t_pl:"Plan treningowy EUFTE",one:"Weekly timed essays on EU topics, self-marked against a checklist; recycle Commission communications as practice documents.",one_pl:"Cotygodniowe eseje na czas, samoocena wg checklisty; komunikaty Komisji jako dokumenty ćwiczeniowe.",say:"Practise the whole 40-minute cycle, not just writing. Take any Commission communication or Council conclusions (a few pages), give yourself a prompt, and run 5-30-5 under a timer. Mark yourself against a checklist: answered the task? clear structure? document used? correct language? position taken? Two essays a week for two months builds the reflex.",say_pl:"Ćwicz cały cykl 40 minut, nie samo pisanie. Weź dowolny komunikat Komisji albo konkluzje Rady (kilka stron), zadaj sobie polecenie i przejedź 5-30-5 na stoperze. Oceń się checklistą: odpowiedziałem na zadanie? jasna struktura? użyty dokument? poprawny język? zajęte stanowisko? Dwa eseje tygodniowo przez dwa miesiące budują odruch.",ex:"Good practice sources: State of the Union letters of intent, Commission work programme, Draghi-report summaries.",ex_pl:"Dobre źródła ćwiczeń: listy intencyjne do orędzia o stanie Unii, program prac Komisji, streszczenia raportu Draghiego.",hook:"Timed reps + checklist marking = essay autopilot.",hook_pl:"Powtórki na czas + checklista = autopilot esejowy.",kw:["timed practice","checklist","Commission communications"]}
];

const VERBAL_LEARN=[
{t:"How verbal questions are built",t_pl:"Jak zbudowane są pytania werbalne",one:"Short factual passage (<200 words) + constant stem: 'Which statement follows / is correct?' Exactly ONE option is true; three engineered distractors.",one_pl:"Krótki tekst faktograficzny (<200 słów) + stałe pytanie: 'Które zdanie wynika / jest poprawne?' Dokładnie JEDNA opcja prawdziwa; trzy zaprojektowane dystraktory.",say:"Every item has the same anatomy. A short factual passage, one stem question, four statements. Exactly one statement is TRUE. The other three are manufactured to look true — each uses a known trap pattern. Your job is not 'find the nice answer' but 'find why three answers are disqualified'. Once you know the trap catalogue, distractors start glowing.",say_pl:"Każde zadanie ma tę samą anatomię. Krótki tekst, jedno stałe pytanie, cztery zdania. Dokładnie jedno jest PRAWDZIWE. Pozostałe trzy wyprodukowano tak, by wyglądały na prawdziwe — każde używa znanego wzorca pułapki. Twoje zadanie to nie 'znajdź ładną odpowiedź', tylko 'znajdź, co dyskwalifikuje trzy pozostałe'. Gdy znasz katalog pułapek, dystraktory zaczynają świecić.",ex:"Test designers reuse the same ~10 trap patterns: extreme words, scope shifts, partial truths, causation swaps… The rest of this deck is that catalogue.",ex_pl:"Twórcy testów używają w kółko ~10 wzorców: słowa absolutne, zmiany zakresu, półprawdy, podmiana przyczynowości… Reszta tej talii to właśnie ten katalog.",hook:"1 true + 3 engineered fakes = every question ever.",hook_pl:"1 prawda + 3 zaprojektowane fałszywki = każde pytanie.",kw:["constant stem","one true","distractor patterns"]},
{t:"The True / False / Cannot-Say lens",t_pl:"Soczewka Prawda / Fałsz / Nie-wiadomo",one:"Every wrong option is either FALSE (contradicts the passage) or CANNOT SAY (goes beyond it). Classify each option — don't just 'feel' it.",one_pl:"Każda zła opcja to FAŁSZ (sprzeczna z tekstem) albo NIE WIADOMO (wykracza poza tekst). Klasyfikuj każdą — nie 'wyczuwaj'.",say:"Even in the 4-option format, think like the designer: a distractor is either a contradiction of the text (False) or something the text doesn't support (Cannot Say). 'Cannot Say' fakes are the dangerous ones — they sound plausible and are often true in the real world. Ask two questions: does this statement claim MORE than the passage says? Am I missing information that would confirm it? If yes → it doesn't follow.",say_pl:"Nawet w formacie 4 opcji myśl jak projektant: dystraktor to albo sprzeczność z tekstem (Fałsz), albo coś, czego tekst nie potwierdza (Nie wiadomo). Groźne są fałszywki typu 'Nie wiadomo' — brzmią wiarygodnie i często są prawdziwe w realnym świecie. Zadaj dwa pytania: czy to zdanie twierdzi WIĘCEJ, niż mówi tekst? Czy brakuje mi informacji, która by je potwierdziła? Jeśli tak → nie wynika.",ex:"Passage: 'knife crime rose in London in 2018.' Statement: 'crime in the UK increased in 2018.' Feels right — but it's a scope jump: Cannot Say.",ex_pl:"Tekst: 'przestępczość nożowa wzrosła w Londynie w 2018'. Zdanie: 'przestępczość w UK wzrosła w 2018'. Brzmi dobrze — ale to skok zakresu: Nie wiadomo.",hook:"Wrong = contradicts OR overreaches. Name which one.",hook_pl:"Złe = przeczy ALBO wykracza. Nazwij które.",kw:["cannot say","contradiction","overreach"]},
{t:"Golden rule: the passage is the universe",t_pl:"Złota zasada: tekst to cały wszechświat",one:"Answer ONLY from the text. Real-world knowledge is bait — statements true in reality but absent from the passage do NOT follow.",one_pl:"Odpowiadaj TYLKO z tekstu. Wiedza własna to przynęta — zdania prawdziwe w realu, ale nieobecne w tekście, NIE wynikają.",say:"The single most exploited weakness: your own knowledge. Designers deliberately write statements that are factually correct in the real world but not supported by the passage. If you 'know' it's true, you pick it — and lose the point. Treat the passage as the entire universe. If the passage doesn't state or strictly imply it, it does not follow, no matter how true it is.",say_pl:"Najczęściej wykorzystywana słabość: twoja własna wiedza. Projektanci celowo piszą zdania faktycznie prawdziwe w realnym świecie, ale niepoparte tekstem. Skoro 'wiesz', że to prawda — zaznaczasz i tracisz punkt. Traktuj tekst jak cały wszechświat. Jeśli tekst czegoś nie stwierdza ani ściśle nie implikuje, to nie wynika — choćby było najprawdziwsze.",ex:"A passage on the euro that never mentions Frankfurt; option: 'The ECB is based in Frankfurt.' True in life, wrong in the test.",ex_pl:"Tekst o euro bez słowa o Frankfurcie; opcja: 'EBC ma siedzibę we Frankfurcie'. Prawda w życiu, błąd w teście.",hook:"True in the world ≠ follows from the passage.",hook_pl:"Prawdziwe w świecie ≠ wynika z tekstu.",kw:["no outside knowledge","strict inference"]},
{t:"Eliminate — don't select",t_pl:"Eliminuj — nie wybieraj",one:"Hunt for disqualifiers in each option: one word that's too strong, one concept the text never mentions. Kill three, keep the survivor.",one_pl:"Szukaj dyskwalifikatorów w każdej opcji: jedno za mocne słowo, jedno pojęcie spoza tekstu. Zabij trzy, zostaw ocalałą.",say:"Flip your strategy. Most people read options looking for the right one — designers exploit that by making a distractor attractive. Instead, prosecute each option: find the single word or claim that disqualifies it. 'Must' where the text says 'can'. 'All' where the text says 'most'. A country, date or cause the passage never mentions. Three convictions, one acquittal — that's your answer.",say_pl:"Odwróć strategię. Większość czyta opcje, szukając tej dobrej — projektanci to wykorzystują, robiąc dystraktor atrakcyjnym. Zamiast tego oskarżaj każdą opcję: znajdź jedno słowo lub twierdzenie, które ją dyskwalifikuje. 'Musi' tam, gdzie tekst mówi 'może'. 'Wszystkie' tam, gdzie tekst mówi 'większość'. Kraj, data albo przyczyna, o których tekst milczy. Trzy wyroki skazujące, jedno uniewinnienie — to twoja odpowiedź.",ex:"You rarely PROVE the right answer quickly, but you can usually disprove a wrong one from a single word.",ex_pl:"Rzadko szybko UDOWODNISZ dobrą odpowiedź, ale złą zwykle obalisz jednym słowem.",hook:"Be the prosecutor, not the shopper.",hook_pl:"Bądź prokuratorem, nie klientem na zakupach.",kw:["elimination","disqualifier word","one-word kill"]},
{t:"Trap: extreme & absolute words",t_pl:"Pułapka: słowa skrajne i absolutne",one:"all, always, never, only, must, none, guarantees — one absolute word turns a true-ish statement into False or Cannot Say.",one_pl:"wszystkie, zawsze, nigdy, tylko, musi, żaden, gwarantuje — jedno absolutne słowo zmienia prawie-prawdę w Fałsz lub Nie wiadomo.",say:"The most common trap. The passage says something moderate; the option restates it with an absolute. 'Improves outcomes' becomes 'always improves outcomes'. 'Most member states' becomes 'all member states'. Absolutes need absolute support in the text — which almost never exists. Softeners work the other way: 'may', 'can', 'some' are easy to support, so a soft statement is more likely to be the true one.",say_pl:"Najczęstsza pułapka. Tekst mówi coś umiarkowanego; opcja powtarza to absolutem. 'Poprawia wyniki' staje się 'zawsze poprawia wyniki'. 'Większość państw' staje się 'wszystkie państwa'. Absoluty wymagają absolutnego oparcia w tekście — a takiego prawie nigdy nie ma. Zmiękczenia działają odwrotnie: 'może', 'niektóre' łatwo poprzeć, więc miękkie zdanie częściej jest tym prawdziwym.",ex:"'Playing a song at peak time will ALWAYS increase sales' — 'always' kills it. With 'may increase' it could be true.",ex_pl:"'Puszczenie piosenki w prime time ZAWSZE zwiększy sprzedaż' — 'zawsze' ją zabija. Z 'może zwiększyć' mogłaby być prawdziwa.",hook:"Absolute word + moderate passage = wrong option.",hook_pl:"Słowo absolutne + umiarkowany tekst = zła opcja.",kw:["all/always/never/only","must vs can","softeners"]},
{t:"Trap: quantifiers & frequency",t_pl:"Pułapka: kwantyfikatory i częstość",one:"most ≠ all · many ≠ most · often ≠ always · some ≠ few. Match the quantifier in the option against the quantifier in the text — exactly.",one_pl:"większość ≠ wszystkie · wiele ≠ większość · często ≠ zawsze · niektóre ≠ mało. Dopasuj kwantyfikator z opcji do tego z tekstu — dokładnie.",say:"Designers shift quantities one notch and bet you won't notice. If the passage says 'most SMEs', an option saying 'all SMEs' is false and 'SMEs' unqualified is suspicious. Also respect what inexact words allow: 'some' is compatible with 'many', 'rarely' still means 'it happens'. 'Unlikely' is not 'impossible'. Underline the quantifier in the option and find its exact counterpart in the passage.",say_pl:"Projektanci przesuwają ilości o jeden stopień i liczą, że nie zauważysz. Gdy tekst mówi 'większość MŚP', opcja 'wszystkie MŚP' jest fałszywa, a 'MŚP' bez kwantyfikatora — podejrzane. Szanuj też, na co pozwalają słowa nieostre: 'niektóre' zgadza się z 'wiele', 'rzadko' wciąż znaczy 'zdarza się'. 'Mało prawdopodobne' to nie 'niemożliwe'. Podkreśl kwantyfikator w opcji i znajdź jego dokładny odpowiednik w tekście.",ex:"Text: 'fat helps absorb vitamins A, D and E.' Option: 'the body absorbs ALL vitamins through fat' — three vitamins ≠ all vitamins → False.",ex_pl:"Tekst: 'tłuszcz pomaga wchłaniać witaminy A, D i E'. Opcja: 'organizm wchłania WSZYSTKIE witaminy dzięki tłuszczowi' — trzy witaminy ≠ wszystkie → Fałsz.",hook:"Check the quantity word twice: text vs option.",hook_pl:"Sprawdź słowo ilości dwa razy: tekst vs opcja.",kw:["most/all","often/always","unlikely ≠ impossible"]},
{t:"Trap: partial truths",t_pl:"Pułapka: półprawdy",one:"The option starts by faithfully repeating the passage… then quietly appends something extra. The true half is camouflage.",one_pl:"Opcja zaczyna od wiernego powtórzenia tekstu… a potem po cichu coś dokleja. Prawdziwa połowa to kamuflaż.",say:"A favourite design: copy a correct clause from the passage so your brain says 'yes, I read that', then bolt on an addition — a new group, a new place, a stronger claim. The appended part makes the whole statement not follow. Read every option to the END; the trap usually lives in the last five words.",say_pl:"Ulubiony zabieg: skopiować poprawny fragment tekstu, żeby mózg powiedział 'tak, to czytałem', a potem doszyć dodatek — nową grupę, nowe miejsce, mocniejsze twierdzenie. Doszyta część sprawia, że całe zdanie nie wynika. Czytaj każdą opcję do KOŃCA; pułapka zwykle mieszka w ostatnich pięciu słowach.",ex:"Text: 'high-street shops struggle to compete with Amazon.' Option: 'high-street shops struggle to compete with ALL online stores.' First half true, extension fatal.",ex_pl:"Tekst: 'sklepy przy głównej ulicy z trudem konkurują z Amazonem'. Opcja: 'z trudem konkurują ze WSZYSTKIMI sklepami online'. Pierwsza połowa prawdziwa, dopisek zabójczy.",hook:"The lie hides behind a true first half — read to the end.",hook_pl:"Kłamstwo chowa się za prawdziwą połową — czytaj do końca.",kw:["appended claim","read the full option"]},
{t:"Trap: scope & generalisation shifts",t_pl:"Pułapka: zmiany zakresu i uogólnienia",one:"Specific in the passage → general in the option (or reverse): London→UK, knife crime→crime, 2018→'recent years', exports→trade.",one_pl:"Szczegół w tekście → ogół w opcji (lub odwrotnie): Londyn→UK, przestępczość nożowa→przestępczość, 2018→'ostatnie lata', eksport→handel.",say:"Watch the frame of every noun: WHO, WHERE, WHEN, WHAT exactly. Designers widen or narrow it. A passage about transport emissions becomes an option about 'emissions'; a fact about one member state becomes a claim about 'the EU'. The numbers or verbs stay identical, so it feels like a match — only the scope moved. Compare subject-for-subject, not vibe-for-vibe.",say_pl:"Pilnuj ramy każdego rzeczownika: KTO, GDZIE, KIEDY, CO dokładnie. Projektanci ją poszerzają albo zwężają. Tekst o emisjach z transportu staje się opcją o 'emisjach'; fakt o jednym państwie — twierdzeniem o 'UE'. Liczby i czasowniki zostają identyczne, więc czuć dopasowanie — ale zakres się przesunął. Porównuj podmiot z podmiotem, nie klimat z klimatem.",ex:"'Knife crime rose in London in 2018' ≠ 'crime in the UK increased in 2018' — two scope jumps in one sentence.",ex_pl:"'Przestępczość nożowa wzrosła w Londynie w 2018' ≠ 'przestępczość w UK wzrosła w 2018' — dwa skoki zakresu w jednym zdaniu.",hook:"Same verb, same year, different WHO/WHERE = trap.",hook_pl:"Ten sam czasownik, ten sam rok, inne KTO/GDZIE = pułapka.",kw:["specific→general","frame check","who-where-when-what"]},
{t:"Trap: comparatives & superlatives",t_pl:"Pułapka: porównania i superlatywy",one:"widest ≠ longest; higher ≠ highest; 'grew fastest' ≠ 'is biggest'. One superlative never implies another.",one_pl:"najszersza ≠ najdłuższa; wyższy ≠ najwyższy; 'rosła najszybciej' ≠ 'jest największa'. Jeden superlatyw nigdy nie implikuje drugiego.",say:"When the passage ranks something on ONE dimension, distractors rank it on another or bundle two rankings together. Being the widest river says nothing about being the longest. The fastest-growing economy needn't be the largest. Also watch direction: 'less slow' is not 'fast', 'fell less than before' is still falling. Isolate the exact dimension being compared.",say_pl:"Gdy tekst szereguje coś w JEDNYM wymiarze, dystraktory szeregują w innym albo sklejają dwa rankingi. Najszersza rzeka nic nie mówi o byciu najdłuższą. Najszybciej rosnąca gospodarka nie musi być największa. Pilnuj też kierunku: 'mniej wolno' to nie 'szybko', 'spadło mniej niż wcześniej' to nadal spadek. Wyizoluj dokładny wymiar porównania.",ex:"Text: 'the Amazon is the widest river.' Option: 'the Amazon is the longest and widest river' — Cannot Say: length was never ranked.",ex_pl:"Tekst: 'Amazonka to najszersza rzeka'. Opcja: 'Amazonka to najdłuższa i najszersza rzeka' — Nie wiadomo: długości nikt nie rankingował.",hook:"Each superlative is a separate claim — never bundle.",hook_pl:"Każdy superlatyw to osobne twierdzenie — nie sklejaj.",kw:["dimension check","fastest ≠ biggest","direction of change"]},
{t:"Trap: causation vs correlation vs sequence",t_pl:"Pułapka: przyczyna vs korelacja vs sekwencja",one:"'led to / because of' = cause. 'at the same time / and also' = correlation. 'then / after' = mere sequence. Options upgrade the weaker into the stronger.",one_pl:"'doprowadziło do / z powodu' = przyczyna. 'w tym samym czasie / a także' = korelacja. 'potem / po' = sama kolejność. Opcje awansują słabsze na mocniejsze.",say:"Three strengths of connection. Causation: X caused Y — needs words like 'because', 'due to', 'led to'. Correlation: X and Y both happened — no claim of cause. Sequence: X happened, then Y — only time order. The classic distractor takes a correlation or a sequence from the passage and rewrites it as causation. If the text only says two things co-occurred, any 'because' in the option is unsupported.",say_pl:"Trzy siły powiązania. Przyczynowość: X spowodowało Y — potrzebuje słów 'bo', 'z powodu', 'doprowadziło do'. Korelacja: X i Y po prostu wystąpiły — bez twierdzenia o przyczynie. Sekwencja: było X, potem Y — tylko kolejność w czasie. Klasyczny dystraktor bierze korelację lub sekwencję z tekstu i przepisuje ją jako przyczynę. Jeśli tekst mówi tylko, że dwie rzeczy współwystąpiły, każde 'ponieważ' w opcji jest bez pokrycia.",ex:"'John jogged, then showered' does NOT support 'John showered because he jogged' — sequence upgraded to cause.",ex_pl:"'Jan pobiegał, potem wziął prysznic' NIE potwierdza 'Jan wziął prysznic, bo pobiegał' — sekwencja awansowana na przyczynę.",hook:"then < and-also < because — options love an upgrade.",hook_pl:"potem < a-także < ponieważ — opcje uwielbiają awans.",kw:["led to/due to","co-occurrence","then ≠ because"]},
{t:"Trap: time implications",t_pl:"Pułapka: implikacje czasowe",one:"Anchor every claim on the timeline: today, in 2018, over the past century, projected by 2050. Options shift tenses and horizons.",one_pl:"Kotwicz każde twierdzenie na osi czasu: dziś, w 2018, przez ostatni wiek, prognoza na 2050. Opcje przesuwają czasy i horyzonty.",say:"Extract the time anchors from the passage and check each option against them. Distractors turn projections into facts ('is expected to shrink' → 'has shrunk'), past into present, or a dated fact into a timeless one. But some time inferences DO follow: 'more allergens today than at any point in the past century' genuinely implies 'more than two decades ago' — that's a legitimate True built on time logic.",say_pl:"Wypisz kotwice czasowe z tekstu i sprawdzaj każdą opcję względem nich. Dystraktory zamieniają prognozy w fakty ('ma się skurczyć' → 'skurczyła się'), przeszłość w teraźniejszość, fakt z datą w ponadczasowy. Ale niektóre wnioski czasowe NAPRAWDĘ wynikają: 'więcej alergenów dziś niż kiedykolwiek w ostatnim stuleciu' rzeczywiście implikuje 'więcej niż dwie dekady temu' — to uprawniona Prawda zbudowana na logice czasu.",ex:"'Median age projected to reach 49 by 2050' ≠ 'the median age is 49'. Projection ≠ current fact.",ex_pl:"'Mediana wieku ma sięgnąć 49 do 2050' ≠ 'mediana wieku wynosi 49'. Prognoza ≠ obecny fakt.",hook:"Underline every date and tense — traps live between them.",hook_pl:"Podkreśl każdą datę i czas — pułapki żyją między nimi.",kw:["projection vs fact","tense shift","time anchors"]},
{t:"Trap: claims, opinions & attributions",t_pl:"Pułapka: twierdzenia, opinie, atrybucje",one:"'Analysts argue X' supports only 'analysts argue X' — not 'X is true'. Watch who says it: the author, experts, 'some', 'critics'.",one_pl:"'Analitycy twierdzą X' potwierdza tylko 'analitycy twierdzą X' — nie 'X jest prawdą'. Patrz, kto mówi: autor, eksperci, 'niektórzy', 'krytycy'.",say:"When the passage attributes a view — 'economists argue', 'the report suggests', 'critics claim' — the fact established is the EXISTENCE of that opinion, not its truth. A distractor drops the attribution and asserts the content directly. Also reversed: the passage states a fact, the option downgrades it to 'some believe'. Track the speaker of every claim.",say_pl:"Gdy tekst przypisuje pogląd — 'ekonomiści twierdzą', 'raport sugeruje', 'krytycy uważają' — ustalonym faktem jest ISTNIENIE tej opinii, nie jej prawdziwość. Dystraktor gubi atrybucję i twierdzi treść wprost. Bywa i odwrotnie: tekst stwierdza fakt, a opcja degraduje go do 'niektórzy sądzą'. Śledź nadawcę każdego twierdzenia.",ex:"Text: 'some economists argue ageing effects could be offset.' Option: 'ageing effects will be offset' — opinion promoted to fact, and 'could' promoted to 'will'.",ex_pl:"Tekst: 'niektórzy ekonomiści twierdzą, że skutki starzenia można by zrównoważyć'. Opcja: 'skutki starzenia zostaną zrównoważone' — opinia awansowana na fakt, a 'można by' na 'zostaną'.",hook:"Who says it is part of what is said.",hook_pl:"Kto mówi, jest częścią tego, co powiedziane.",kw:["attribution","opinion ≠ fact","argue/suggest/claim"]},
{t:"Method: keywords + local reading",t_pl:"Metoda: słowa-klucze + czytanie lokalne",one:"Skim first 1-2 sentences → read the options → pick a keyword per option → find it in the passage → read one sentence before and after.",one_pl:"Przejrzyj 1-2 pierwsze zdania → przeczytaj opcje → wybierz słowo-klucz z każdej → znajdź je w tekście → przeczytaj zdanie przed i po.",say:"Under 105 seconds per question you cannot read everything twice. Routine: glance at the opening to get the topic; go to the statements; for each, choose a distinctive keyword (a number, name, or rare noun); locate it in the passage; read the sentence before and after. That local window nearly always contains the verdict. It also forces you to verify against text instead of memory — which is exactly where traps operate.",say_pl:"Przy ~105 sekundach na pytanie nie przeczytasz wszystkiego dwa razy. Rutyna: rzut oka na początek, żeby złapać temat; przejdź do zdań; dla każdego wybierz wyrazisty klucz (liczbę, nazwę, rzadki rzeczownik); zlokalizuj go w tekście; przeczytaj zdanie przed i po. To lokalne okno prawie zawsze zawiera werdykt. Zmusza też do weryfikacji z tekstem, a nie z pamięcią — a właśnie na pamięci żerują pułapki.",ex:"Option mentions '14 days refund' → jump to '14' in the passage → the neighbouring sentence says the clock starts when the trader is INFORMED, not when goods arrive. Verdict found.",ex_pl:"Opcja wspomina 'zwrot w 14 dni' → skocz do '14' w tekście → sąsiednie zdanie mówi, że zegar rusza od POINFORMOWANIA sprzedawcy, nie od dotarcia towaru. Werdykt znaleziony.",hook:"Topic glance → keyword → one-sentence radius → verdict.",hook_pl:"Rzut na temat → klucz → promień jednego zdania → werdykt.",kw:["skim","keyword search","local window","105 s/question"]},
{t:"Method: timing & smart guessing",t_pl:"Metoda: czas i mądre zgadywanie",one:"~35 min / 20 Q. No negative marking — never leave blanks. Eliminate one or two options, then guess and move on.",one_pl:"~35 min / 20 pytań. Bez punktów ujemnych — nigdy nie zostawiaj pustych. Wyeliminuj jedną-dwie opcje, zgadnij i idź dalej.",say:"Verbal is 35 minutes for 20 questions and it counts 35% of your score — but a question you agonise over is worth the same as one you crack in 40 seconds. Set a soft limit (~90-105 s). If stuck, eliminate the options with obvious disqualifiers — that alone moves you from 25% to 33-50% odds — pick the survivor with the SOFTEST language, answer, flag mentally, move on. Wrong answers cost nothing; empty answers cost everything.",say_pl:"Werbalny to 35 minut na 20 pytań i 35% wyniku — ale pytanie, nad którym cierpisz, jest warte tyle samo, co rozgryzione w 40 sekund. Ustaw miękki limit (~90-105 s). Gdy utkniesz, wyeliminuj opcje z oczywistymi dyskwalifikatorami — to samo podnosi szanse z 25% do 33-50% — wybierz ocalałą z NAJMIĘKSZYM językiem, odpowiedz, zapamiętaj, idź dalej. Złe odpowiedzi nie kosztują nic; puste kosztują wszystko.",ex:"Two options left, one says 'always', one says 'may' — under time pressure, 'may' is the statistical favourite.",ex_pl:"Zostały dwie opcje: jedna mówi 'zawsze', druga 'może' — pod presją czasu 'może' jest statystycznym faworytem.",hook:"Eliminate → soft option → answer → next. Never blank.",hook_pl:"Eliminuj → miękka opcja → odpowiedz → dalej. Nigdy pusto.",kw:["no negative marking","90-second rule","soft language wins"]}
];
